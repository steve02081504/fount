name: Update locale files

permissions:
  contents: write

on:
  push:
    branches:
      - master
    paths:
      - 'src/public/locales/**.json'
      - '**/home_registry.json'
      - '**/locales.json'
    tags-ignore:
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/public/locales/**.json'
      - '**/home_registry.json'
      - '**/locales.json'
  workflow_dispatch:

jobs:
  update-locales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
      - name: run script to update locale files
        run: |
          pip install deep_translator json5 pathspec
          python ./.esh/commands/update-locales.py
      - name: git add all
        run: git add -A
      - name: Push changes
        uses: actions-go/push@master
        with:
          author-email: taromati2@outlook.com
          author-name: Taromati2
          commit-message: 'file update~'
          remote: origin
          token: ${{ secrets.GITHUB_TOKEN }}
