name: Update locale files

permissions:
  contents: write

on:
  push:
    branches:
      - master
    paths:
      - 'src/public/locales/**.json'
      - '**/home_registry.json'
      - '**/locales.json'
    tags-ignore:
      - '*'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/public/locales/**.json'
      - '**/home_registry.json'
      - '**/locales.json'
  workflow_dispatch:

jobs:
  update-locales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
      - name: run script to update locale files
        run: |
          pip install deep_translator json5 pathspec
          python ./.esh/commands/update-locales.py
      - name: git add all
        run: git add -A
      # pull_request 下 github.ref 为 refs/pull/N/merge，checkout 后本地无该引用；
      # actions-go/push 默认 ref 指向它会报 reference not found，故 PR 用 HEAD 推到源分支。
      - name: Push changes
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions-go/push@master
        with:
          author-email: taromati2@outlook.com
          author-name: Taromati2
          commit-message: 'file update~'
          remote: origin
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'pull_request' && 'HEAD' || github.ref }}
          remote-ref: ${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref) || github.ref }}
