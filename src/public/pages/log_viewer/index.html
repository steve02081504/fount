<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="View live fount server logs and run a JavaScript REPL in the browser.">
	<link rel="icon" href="/favicon.ico" />
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<link rel="manifest" href="/manifest.json" />
	<title data-i18n="log_viewer.title"></title>
	<script blocking="render" type="module" src="/preload.mjs"></script>
	<link href="https://cdn.jsdelivr.net/npm/daisyui/daisyui.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<link href="/base.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
	<script type="module" src="/base.mjs"></script>
</head>

<body class="h-screen flex flex-col overflow-hidden bg-base-200">
	<main class="flex flex-col flex-1 min-h-0 p-2 gap-2">
		<div class="rounded-box border border-base-300 overflow-hidden flex flex-col flex-1 min-h-0 bg-base-100 shadow-xl">
			<div id="log-toolbar-container" class="log-container flex-shrink-0"></div>
			<div id="backend-log-list" class="flex-1 min-h-0 overflow-auto log-container"></div>
		</div>
		<div class="flex-shrink-0 rounded-box border border-base-300 bg-base-100 shadow-xl p-3">
			<div id="repl-output" class="rounded-box border border-base-300 overflow-auto max-h-40 bg-base-200 log-container mb-2 text-sm"></div>
			<div class="relative">
				<textarea id="repl-input" class="textarea textarea-bordered w-full font-mono text-sm" rows="3" data-i18n="log_viewer.repl.input"></textarea>
				<ul id="repl-completions" class="hidden absolute bottom-full left-0 right-0 mb-1 menu bg-base-100 border border-base-300 rounded-box shadow-lg max-h-48 overflow-auto z-10 p-1"></ul>
			</div>
			<p class="text-xs opacity-60 mt-1" data-i18n="log_viewer.repl.hint"></p>
		</div>
	</main>

	<script type="module" src="./index.mjs"></script>
</body>

</html>
