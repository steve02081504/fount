<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title data-i18n="chat.hub.title"></title>
	<link rel="icon" href="/favicon.ico" />
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<script blocking="render" type="module" src="/preload.mjs"></script>
	<link href="https://cdn.jsdelivr.net/npm/daisyui/daisyui.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<link href="/base.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
	<script type="module" src="/base.mjs"></script>
	<link href="./index.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
</head>

<body class="m-0 h-screen w-screen overflow-hidden">
	<div class="drawer drawer-end">
		<input id="hub-files-drawer-toggle" type="checkbox" class="drawer-toggle" />
		<div class="drawer-content hub-app flex h-screen w-screen bg-[var(--hub-bg-main)] text-[var(--hub-text-normal)]">
		<aside class="hub-server-bar w-[72px] shrink-0 overflow-y-auto bg-[var(--hub-bg-server)] py-3 flex flex-col items-center gap-2" id="hub-server-bar">
			<button type="button" class="hub-server-item" data-mode="friends" data-i18n="chat.hub.friendsTooltip">
				<img src="https://api.iconify.design/line-md/person.svg" width="24" height="24" alt="" aria-hidden="true" />
				<span class="hub-server-tooltip" data-i18n="chat.hub.charsTooltip.tip"></span>
			</button>
			<button type="button" class="hub-server-item hub-server-inbox" data-mode="inbox" data-i18n="chat.hub.inboxTooltip">
				<img src="https://api.iconify.design/line-md/at.svg" width="24" height="24" alt="" aria-hidden="true" />
				<span class="hub-unread-badge hidden" id="hub-inbox-badge" aria-hidden="true"></span>
				<span class="hub-server-tooltip" data-i18n="chat.hub.inboxTooltip.tip"></span>
			</button>
			<div class="hub-server-divider"></div>
			<div id="hub-server-list"></div>
			<button type="button" class="hub-server-item" id="hub-discovery-button" data-mode="discovery" data-i18n="chat.hub.discoveryTooltip">
				<img src="https://api.iconify.design/mdi/compass-outline.svg" width="24" height="24" alt="" aria-hidden="true" />
				<span class="hub-server-tooltip" data-i18n="chat.hub.discoveryTooltip.tip"></span>
			</button>
			<button type="button" class="hub-server-item" id="hub-federation-settings-button" data-i18n="chat.hub.federationTooltip">
				<img src="https://api.iconify.design/line-md/cog.svg" width="24" height="24" alt="" aria-hidden="true" />
				<span class="hub-server-tooltip" data-i18n="chat.hub.federationTooltip.tip"></span>
			</button>
			<button type="button" class="hub-server-item hub-server-add" id="hub-add-server-button" data-i18n="chat.hub.addServerTooltip">
				<img src="https://api.iconify.design/line-md/plus.svg" width="24" height="24" alt="" aria-hidden="true" />
				<span class="hub-server-tooltip" data-i18n="chat.hub.addServerTooltip.tip"></span>
			</button>
		</aside>

		<aside class="hub-channel-bar w-60 shrink-0 bg-[var(--hub-bg-channel)] flex flex-col" id="channel-bar">
			<header class="hub-channel-header h-12 min-h-12 px-4 border-b border-[var(--hub-border)] shadow-sm flex items-center justify-between font-bold text-base text-[var(--hub-text-bright)] cursor-pointer" id="hub-group-header" data-i18n="chat.hub.groupHeaderMenu" aria-haspopup="menu">
				<span id="hub-group-name-display"></span>
				<img src="https://api.iconify.design/mdi/chevron-down.svg" width="14" height="14" alt="" aria-hidden="true" />
			</header>
			<div class="hub-channel-list flex-1 overflow-y-auto py-2" id="hub-channel-list"></div>
			<div class="hub-user-bar" id="hub-user-bar">
				<div class="hub-avatar-wrap hub-user-avatar-wrap">
					<div class="hub-avatar" id="hub-my-avatar">?</div>
					<span class="hub-status-dot hub-user-status-dot" id="hub-my-status-dot" data-status="offline"></span>
				</div>
				<div class="hub-user-meta">
					<div id="hub-my-name" class="hub-user-name" data-i18n="chat.hub.userLoading"></div>
					<div id="my-status-row" class="hub-user-status-row">
						<span id="hub-my-status-text"></span>
					</div>
				</div>
				<a href="/parts/shells:chat/profile" class="hub-user-settings-link" data-i18n="chat.hub.profileLinkTitle" onclick="event.stopPropagation();">
					<img src="https://api.iconify.design/line-md/cog.svg" width="18" height="18" alt="" aria-hidden="true" />
				</a>
			</div>
		</aside>

		<main class="hub-main flex-1 min-w-0 flex flex-col bg-[var(--hub-bg-main)]">
			<header class="hub-main-header h-12 min-h-12 px-4 border-b border-[var(--hub-border)] shadow-sm flex items-center gap-2 z-[1] relative">
				<button type="button" class="hub-top-back" id="hub-top-back-button" data-i18n="chat.hub.backToNav">
					<img src="https://api.iconify.design/mdi/arrow-left.svg" width="18" height="18" alt="" aria-hidden="true" />
				</button>
				<span class="hub-main-header-icon">#</span>
				<span class="hub-main-header-title" id="hub-channel-name-display"></span>
				<div class="flex-1"></div>
				<div class="hub-header-pop hub-header-desktop-only" id="hub-pins-pop" hidden>
					<button type="button" class="hub-icon-button hub-header-pop-button" id="hub-pins-button" data-i18n="chat.hub.pinsButton" aria-haspopup="dialog" aria-expanded="false">
						<img src="https://api.iconify.design/mdi/pin.svg" alt="" aria-hidden="true" />
						<span class="hub-header-pop-count" id="hub-pins-count" hidden></span>
					</button>
					<div class="hub-header-panel" id="hub-pins-panel" hidden role="dialog">
						<div class="hub-header-panel-title" data-i18n="chat.hub.pinsTitle"></div>
						<div id="hub-pins-wrap" class="hub-header-panel-body"></div>
					</div>
				</div>
				<div class="hub-header-pop hub-header-desktop-only" id="hub-bookmarks-pop" hidden>
					<button type="button" class="hub-icon-button hub-header-pop-button" id="hub-bookmarks-button" data-i18n="chat.hub.bookmarksButton" aria-haspopup="dialog" aria-expanded="false">
						<img src="https://api.iconify.design/mdi/bookmark-outline.svg" alt="" aria-hidden="true" />
						<span class="hub-header-pop-count" id="hub-bookmarks-count" hidden></span>
					</button>
					<div class="hub-header-panel" id="hub-bookmarks-panel" hidden role="dialog">
						<div class="hub-header-panel-title" data-i18n="chat.hub.bookmarksTitle"></div>
						<div id="hub-bookmarks-wrap" class="hub-header-panel-body"></div>
					</div>
				</div>
				<div id="hub-header-search-wrap" class="hub-search-wrap hub-header-desktop-only">
					<select id="hub-search-scope" class="hub-search-scope select select-bordered select-xs">
						<option value="group" data-i18n="chat.hub.search.scopeGroup"></option>
						<option value="all" data-i18n="chat.hub.search.scopeAll"></option>
					</select>
					<input id="hub-header-search" class="hub-search-input" type="search" data-i18n="chat.hub.search" />
					<img src="https://api.iconify.design/line-md/search.svg" class="hub-search-icon" width="14" height="14" alt="" aria-hidden="true" />
					<div id="hub-search-results" class="hub-search-results" hidden></div>
				</div>
				<button type="button" class="hub-icon-button" id="hub-header-call-button" data-i18n="chat.hub.callButton" hidden>
					<img src="https://api.iconify.design/mdi/phone.svg" alt="" aria-hidden="true" />
					<span class="hub-header-pop-count" id="hub-call-count" hidden></span>
				</button>
				<button type="button" class="hub-icon-button" id="hub-toggle-members-button" data-i18n="chat.hub.membersTitle">
					<img src="https://api.iconify.design/line-md/account.svg" alt="" aria-hidden="true" />
				</button>
				<button type="button" class="hub-icon-button hub-header-desktop-only" id="hub-header-files-button" data-i18n="chat.hub.filesTitle" hidden>
					<img src="https://api.iconify.design/line-md/document.svg" alt="" aria-hidden="true" />
				</button>
				<div class="dropdown dropdown-end hub-header-overflow">
					<button type="button" tabindex="0" class="hub-icon-button" id="hub-header-more-button" data-i18n="chat.hub.moreActions" aria-haspopup="menu">
						<img src="https://api.iconify.design/mdi/dots-vertical.svg" alt="" aria-hidden="true" />
					</button>
					<ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-50 w-44 p-2 shadow border border-base-300" role="menu">
						<li><button type="button" id="hub-overflow-pins" data-i18n="chat.hub.pinsButton"></button></li>
						<li><button type="button" id="hub-overflow-bookmarks" data-i18n="chat.hub.bookmarksButton"></button></li>
						<li><button type="button" id="hub-overflow-search" data-i18n="chat.hub.search"></button></li>
						<li><button type="button" id="hub-overflow-files" data-i18n="chat.hub.filesTitle"></button></li>
					</ul>
				</div>
				<div class="hub-mobile-search-bar" id="hub-mobile-search-bar">
					<button type="button" class="hub-icon-button" id="hub-mobile-search-close" data-i18n="chat.hub.ariaClose">×</button>
					<select id="hub-mobile-search-scope" class="hub-search-scope select select-bordered select-xs shrink-0">
						<option value="group" data-i18n="chat.hub.search.scopeGroup"></option>
						<option value="all" data-i18n="chat.hub.search.scopeAll"></option>
					</select>
					<input id="hub-mobile-search-input" class="hub-search-input flex-1 min-w-0" type="search" data-i18n="chat.hub.search" />
				</div>
			</header>
			<div id="hub-group-state-host-buffer-banner" class="alert alert-info rounded-none py-2 text-sm" hidden>
				<span id="hub-group-state-host-buffer-banner-text" data-i18n="chat.hub.banners.gshBuffer"></span>
			</div>
			<div id="hub-plaintext-main-banner" class="alert alert-info rounded-none py-2 text-sm" hidden>
				<span id="hub-plaintext-main-banner-text" data-i18n="chat.hub.banners.plaintextSidecar"></span>
			</div>
			<div id="hub-archive-coverage-banner" class="alert alert-warning rounded-none py-2 text-sm" hidden>
				<span id="hub-archive-coverage-banner-text" data-i18n="chat.hub.banners.archiveCoverageIncomplete"></span>
				<button type="button" id="hub-archive-sync-button" class="btn btn-xs btn-outline ml-2" data-i18n="chat.hub.banners.archiveSyncButton"></button>
			</div>
			<div id="hub-quarantine-banner" class="alert alert-warning rounded-none py-2 text-sm" hidden>
				<span id="hub-quarantine-banner-text" data-i18n="chat.hub.banners.quarantine"></span>
			</div>
			<div id="hub-local-view-banner" class="alert alert-info rounded-none py-2 text-sm" hidden>
				<span data-i18n="chat.hub.localMaterializedView"></span>
			</div>
			<div id="hub-sync-banner" class="alert alert-info rounded-none py-2 text-sm" hidden>
				<span id="hub-sync-banner-text" data-i18n="chat.hub.banners.syncing"></span>
			</div>
			<div id="hub-shun-removed-banner" class="alert alert-warning rounded-none py-2 text-sm flex flex-wrap items-center gap-2" hidden>
				<span id="hub-shun-removed-banner-text" data-i18n="chat.hub.banners.suspectedRemoved"></span>
				<button type="button" id="hub-shun-keep-history-button" class="btn btn-xs btn-outline" data-i18n="chat.hub.banners.suspectedRemovedKeep"></button>
				<button type="button" id="hub-shun-leave-button" class="btn btn-xs btn-error btn-outline" data-i18n="chat.hub.banners.suspectedRemovedLeave"></button>
			</div>
			<div id="hub-fork-banner" class="alert alert-warning rounded-none py-2 text-sm flex-col items-stretch gap-2" hidden>
				<span id="hub-fork-banner-text"></span>
				<div class="hub-fork-actions">
					<label class="hub-fork-label" for="hub-fork-tip-select" data-i18n="chat.hub.banners.forkTipLabel"></label>
					<select id="hub-fork-tip-select" class="hub-fork-select" data-i18n="chat.hub.ariaDagTip"></select>
					<button type="button" id="hub-fork-branch-button" class="btn btn-xs btn-ghost" data-i18n="chat.hub.banners.applyBranch"></button>
					<button type="button" id="hub-fork-auto-branch-button" class="btn btn-xs btn-ghost" data-i18n="chat.hub.banners.autoBranch"></button>
					<button type="button" id="hub-fork-merge-button" class="btn btn-xs btn-ghost" data-i18n="chat.hub.banners.mergeDag"></button>
					<button type="button" id="hub-fork-block-opposing-button" class="btn btn-xs btn-error btn-outline" data-i18n="chat.hub.banners.blockOpposing"></button>
					<button type="button" id="hub-fork-split-button" class="btn btn-xs btn-ghost" data-i18n="chat.hub.banners.splitFork"></button>
				</div>
			</div>
			<div id="hub-channel-pins-bar" class="hub-channel-pins-bar" hidden></div>
			<div class="hub-main-body flex flex-1 min-h-0 min-w-0 relative">
			<div class="hub-messages flex-1 overflow-y-auto flex flex-col min-w-0" id="hub-messages">
				<div class="hub-empty hub-empty--idle" aria-hidden="true">
					<div class="hub-empty-icon"><img src="https://api.iconify.design/line-md/chat-round.svg" class="hub-empty-icon-img" width="48" height="48" alt="" aria-hidden="true" /></div>
				</div>
			</div>
			<div id="hub-thread-drawer-wrap" class="hub-thread-drawer-wrap" hidden></div>
			</div>

			<div id="hub-attachment-preview" class="hub-attachment-preview"></div>
			<div id="hub-composer-extras" class="hub-composer-extras flex flex-wrap items-center gap-2 px-4 py-1 text-sm hidden">
				<label class="flex items-center gap-1 cursor-pointer" title data-i18n-title="chat.hub.contentWarning">
					<span class="opacity-70 text-xs" data-i18n="chat.hub.contentWarning"></span>
					<input type="text" id="hub-content-warning" class="input input-bordered input-xs w-40 min-w-0" data-i18n="chat.hub.contentWarning" />
				</label>
				<label class="flex items-center gap-1 cursor-pointer">
					<input type="checkbox" id="hub-sensitive-media" class="checkbox checkbox-xs" />
					<span class="opacity-70 text-xs" data-i18n="chat.hub.sensitiveMedia"></span>
				</label>
			</div>
			<div class="hub-input-area">
				<div class="hub-input-wrapper bg-[var(--hub-bg-input)] rounded-lg px-4 min-h-11 flex items-end gap-3 relative">
					<div class="dropdown dropdown-top hub-composer-more">
						<button type="button" tabindex="0" class="hub-icon-button" id="hub-composer-more-button" data-i18n="chat.hub.composerMore" disabled>
							<img src="https://api.iconify.design/mdi/plus.svg" alt="" aria-hidden="true" />
						</button>
						<ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-50 w-44 p-2 shadow border border-base-300 mb-2" role="menu">
							<li><button type="button" id="hub-composer-more-voice" data-i18n="chat.chatArea.voiceButton"></button></li>
							<li><button type="button" id="hub-composer-more-photo" data-i18n="chat.chatArea.photoButton"></button></li>
							<li><button type="button" id="hub-composer-more-upload" data-i18n="chat.hub.uploadTitle"></button></li>
							<li><button type="button" id="hub-composer-more-vote" data-i18n="chat.hub.voteTitle"></button></li>
							<li><button type="button" id="hub-composer-more-sticker" data-i18n="chat.hub.stickerTitle"></button></li>
						</ul>
					</div>
					<button type="button" class="hub-icon-button hub-composer-desktop-tool" id="hub-voice-button" data-i18n="chat.chatArea.voiceButton" disabled>
						<img src="https://api.iconify.design/material-symbols/mic.svg" alt="" aria-hidden="true" />
					</button>
					<button type="button" class="hub-icon-button hub-composer-desktop-tool" id="hub-photo-button" data-i18n="chat.chatArea.photoButton" disabled>
						<img src="https://api.iconify.design/proicons/photo.svg" alt="" aria-hidden="true" />
					</button>
					<button type="button" class="hub-icon-button hub-composer-desktop-tool" id="hub-upload-button" data-i18n="chat.hub.uploadTitle" disabled>
						<img src="https://api.iconify.design/mdi/paperclip.svg" alt="" aria-hidden="true" />
					</button>
					<input type="file" id="hub-image-upload-input" multiple hidden />
					<textarea id="hub-message-input" class="hub-input flex-1 bg-transparent border-none outline-none text-base py-[11px] text-[var(--hub-text-normal)] resize-none min-h-11 max-h-40 leading-normal" rows="1" data-i18n="chat.hub.composerDisabled" disabled></textarea>
					<button type="button" class="hub-icon-button" id="hub-emoji-button" data-i18n="chat.hub.emojiTitle" disabled>
						<img src="https://api.iconify.design/line-md/emoji-smile.svg" alt="" aria-hidden="true" />
					</button>
					<button type="button" class="hub-icon-button hub-composer-desktop-tool" id="hub-vote-button" data-i18n="chat.hub.voteTitle" disabled>
						<img src="https://api.iconify.design/line-md/confirm.svg" alt="" aria-hidden="true" />
					</button>
					<button type="button" class="hub-icon-button hub-composer-desktop-tool" id="hub-sticker-button" data-i18n="chat.hub.stickerTitle" disabled>
						<img src="https://api.iconify.design/mdi/sticker-plus-outline.svg" alt="" aria-hidden="true" />
					</button>
					<button type="button" class="hub-composer-stop-button btn btn-error btn-sm !h-9 !w-9 !min-h-0 rounded-lg" id="hub-stop-generation-button" data-i18n="chat.hub.stopGenerateTitle" hidden>
						<img src="https://api.iconify.design/mdi/stop.svg" width="14" height="14" alt="" aria-hidden="true" />
					</button>
					<button type="button" class="hub-composer-send-button btn btn-primary btn-sm !h-8 !w-9 !min-h-0 rounded-md" id="hub-send-button" data-i18n="chat.hub.sendTitle" disabled>
						<img src="https://api.iconify.design/line-md/telegram.svg" alt="" aria-hidden="true" />
					</button>
					<div class="hub-sticker-picker" id="hub-sticker-picker">
						<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
							<span style="font-weight:600;font-size:14px;color:var(--hub-text-bright);" data-i18n="chat.hub.stickersPanelTitle"></span>
							<a href="/parts/shells:chat/stickers" target="_blank" rel="noopener" style="font-size:12px;color:var(--hub-accent);text-decoration:none;" data-i18n="chat.hub.stickersManage"></a>
						</div>
						<div class="hub-sticker-grid" id="hub-sticker-grid">
							<div style="grid-column:1/-1;text-align:center;color:var(--hub-text-muted);padding:20px;font-size:13px;" data-i18n="chat.hub.stickersLoading"></div>
						</div>
					</div>
					<div class="hub-emoji-picker" id="hub-emoji-picker">
						<div class="hub-emoji-tabs" id="hub-emoji-tabs"></div>
						<div class="hub-emoji-grid" id="hub-emoji-grid"></div>
					</div>
				</div>
			</div>
		</main>

		<aside class="hub-member-bar w-60 shrink-0 overflow-y-auto bg-[var(--hub-bg-member)] py-4" id="hub-member-bar">
			<div id="hub-info-card-host"></div>
			<div id="hub-member-list"></div>
			<div id="hub-member-digest" class="hub-member-digest" hidden></div>
		</aside>
		<button type="button" class="hub-member-backdrop" id="hub-member-backdrop" data-i18n="chat.hub.ariaClose"></button>
		</div>

		<div class="drawer-side z-50">
			<label for="hub-files-drawer-toggle" class="drawer-overlay" data-i18n="chat.hub.ariaClose"></label>
			<aside class="hub-files-panel w-80 min-h-full bg-[var(--hub-bg-channel)] border-l border-[var(--hub-border)] p-4 flex flex-col gap-3 text-[var(--hub-text-normal)]" role="dialog" aria-labelledby="hub-files-title">
				<header class="flex items-center justify-between gap-2">
					<h2 id="hub-files-title" class="font-bold text-lg" data-i18n="chat.hub.filesDrawerTitle"></h2>
					<label for="hub-files-drawer-toggle" class="btn btn-ghost btn-sm btn-circle" data-i18n="chat.hub.ariaClose">×</label>
				</header>
				<p id="hub-files-convergent-warn" class="text-warning text-sm" data-i18n="chat.hub.convergentEncryptWarn"></p>
				<div class="flex flex-wrap gap-2 items-center">
					<label class="text-sm opacity-70" data-i18n="chat.hub.filesUploadTo"></label>
					<select id="hub-files-folder-select" class="select select-bordered select-sm flex-1 min-w-0"></select>
					<button type="button" id="hub-files-new-folder" class="btn btn-ghost btn-sm" data-i18n="chat.hub.filesNewFolder"></button>
					<button type="button" id="hub-files-upload-button" class="btn btn-primary btn-sm" data-i18n="chat.hub.filesUpload"></button>
					<input type="file" id="hub-files-upload-input" hidden />
				</div>
				<div id="hub-files-list" class="flex-1 overflow-y-auto min-h-0"></div>
			</aside>
		</div>
	</div>

	<dialog id="hub-fork-split-modal" class="modal">
		<div class="modal-box hub-overlay-box">
			<h3 class="font-bold text-lg mb-3" data-i18n="chat.hub.forkSplitModalTitle"></h3>
			<label class="form-control w-full mb-4">
				<span class="label-text" data-i18n="chat.hub.forkSplitPrompt"></span>
				<input type="text" id="hub-fork-split-name" class="input input-bordered w-full" autocomplete="off" />
			</label>
			<div class="flex justify-end gap-2">
				<button type="button" id="hub-fork-split-cancel-button" class="btn btn-ghost" data-i18n="chat.hub.messageEditCancel"></button>
				<button type="button" id="hub-fork-split-submit-button" class="btn btn-primary" data-i18n="chat.hub.forkSplitModalSubmit"></button>
			</div>
		</div>
		<form method="dialog" class="modal-backdrop"><button data-i18n="chat.hub.modalClose"></button></form>
	</dialog>

	<dialog id="hub-vote-modal" class="modal">
		<div class="modal-box hub-overlay-box hub-vote-modal-box">
			<h3 class="font-bold text-lg mb-3" data-i18n="chat.hub.voteModalTitle"></h3>
			<label class="form-control w-full mb-3">
				<span class="label-text" data-i18n="chat.hub.votePromptQuestion"></span>
				<input type="text" id="hub-vote-question" class="input input-bordered w-full" autocomplete="off" />
			</label>
			<label class="form-control w-full mb-3">
				<span class="label-text" data-i18n="chat.hub.votePromptOptions"></span>
				<textarea id="hub-vote-options" class="textarea textarea-bordered w-full" rows="4" data-i18n="chat.hub.voteOptionDefault"></textarea>
			</label>
			<label class="form-control w-full mb-4">
				<span class="label-text" data-i18n="chat.hub.votePromptDeadlineHours"></span>
				<input type="number" id="hub-vote-hours" class="input input-bordered w-full" min="0" step="1" value="24" />
			</label>
			<div class="flex justify-end gap-2">
				<button type="button" id="hub-vote-cancel-button" class="btn btn-ghost" data-i18n="chat.hub.messageEditCancel"></button>
				<button type="button" id="hub-vote-submit-button" class="btn btn-primary" data-i18n="chat.hub.voteModalSubmit"></button>
			</div>
		</div>
		<form method="dialog" class="modal-backdrop"><button data-i18n="chat.hub.modalClose"></button></form>
	</dialog>

	<dialog id="hub-settings-modal" class="modal">
		<div class="modal-box hub-overlay-box" id="hub-overlay-box">
			<div class="hub-overlay-header p-4 bg-gradient-to-br from-primary/90 to-primary text-primary-content">
				<h3 id="hub-overlay-title" data-i18n="chat.hub.settingsModalTitle"></h3>
				<p id="hub-overlay-subtitle"></p>
			</div>
			<div class="hub-overlay-body p-4 space-y-3 max-h-[65vh] overflow-y-auto" id="hub-overlay-body"></div>
			<div class="hub-overlay-footer p-4 border-t border-base-300 flex justify-end gap-2" id="hub-overlay-footer"></div>
		</div>
		<form method="dialog" class="modal-backdrop"><button data-i18n="chat.hub.modalClose"></button></form>
	</dialog>

	<div class="hub-hover-card" id="hub-profile-hover-card">
		<div class="hub-hover-card-banner"></div>
		<div class="hub-hover-card-body">
			<div class="hub-hover-card-avatar-wrap">
				<div class="hub-hover-card-avatar" id="hover-card-avatar">
					<span id="hover-card-avatar-letter">?</span>
				</div>
				<span class="hub-status-dot hub-hover-card-status-dot" id="hover-card-status-dot" data-status="offline"></span>
			</div>
			<div class="hub-hover-card-name" id="hover-card-name">—</div>
			<div class="hub-hover-card-status-text" id="hover-card-status-text"></div>
			<div class="hub-hover-card-divider"></div>
			<div class="hub-hover-card-section-title" data-i18n="chat.hub.aboutSection"></div>
			<div class="hub-hover-card-bio" id="hover-card-bio" data-i18n="chat.hub.bioEmpty"></div>
		</div>
	</div>

	<script type="module" src="./index.mjs"></script>
</body>

</html>
