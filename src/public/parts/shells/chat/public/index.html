<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta property="og:title" content="The Stage of Whispers: Your fount Conversations" />
	<meta property="og:url" content="https://steve02081504.github.io/fount/protocol?url=fount://page/parts/shells:chat/" />
	<meta property="og:type" content="website" />
	<meta property="og:description" content="Where words take flight and stories unfold. Engage with your AI companions, shape the narrative, and lose yourself in the ebb and flow of digital dialogue. The heart of fount beats here." />
	<meta name="description" content="Where words take flight and stories unfold. Engage with your AI companions, shape the narrative, and lose yourself in the ebb and flow of digital dialogue. The heart of fount beats here." />
	<meta property="og:image" content="https://repository-images.githubusercontent.com/862251163/0ac90205-ae40-4fc6-af67-1e28d074c76b" />
	<title data-i18n="chat.title"></title>
	<link rel="icon" href="/favicon.ico" />
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<link rel="manifest" href="/manifest.json" />
	<script blocking="render" type="module" src="/preload.mjs"></script>
	<link href="https://cdn.jsdelivr.net/npm/daisyui/daisyui.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<link href="/base.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
	<script type="module" src="/base.mjs"></script>
	<link rel="stylesheet" href="./index.css" type="text/css" />
</head>

<body class="flex h-screen h-dvh m-0 relative w-full">
	<!-- Left Sidebar: 群组设置抽屉 -->
	<div class="absolute top-0 left-0 z-40" id="left-drawer-container">
		<div class="drawer h-full">
			<input id="left-drawer" type="checkbox" class="drawer-toggle" aria-hidden="true" style="display: none;" />
			<div class="drawer-side z-40">
				<label for="left-drawer" class="drawer-overlay"></label>
				<div class="w-80 bg-base-200 text-base-content p-4 overflow-y-auto h-screen h-dvh shadow-lg flex flex-col gap-4">
					<h2 class="text-lg font-bold" data-i18n="chat.sidebar.settings.title"></h2>

					<!-- Data Management -->
					<section id="data-management">
						<div class="flex items-center gap-2 mb-1">
							<img src="https://api.iconify.design/mdi/database-cog-outline.svg" class="w-5 h-5 icon" />
							<span class="text-sm font-semibold" data-i18n="chat.sidebar.dataMgmt.title"></span>
						</div>
						<div class="flex flex-col gap-1">
							<button type="button" class="btn btn-xs btn-outline w-full" id="compact-group-button" data-i18n="chat.sidebar.dataMgmt.compact"></button>
							<div class="flex gap-1 items-center">
								<input type="number" id="prune-keep-n" class="input input-xs input-bordered w-20" value="200" min="10" max="10000" />
								<button type="button" class="btn btn-xs btn-error flex-1" id="prune-messages-button" data-i18n="chat.sidebar.dataMgmt.prune"></button>
							</div>
						</div>
					</section>

					<section id="group-governance-section" class="hidden flex flex-col gap-1">
						<button type="button" class="btn btn-xs btn-outline w-full" id="group-owner-succession-button" data-i18n="chat.group.ownerSuccession"></button>
						<button type="button" class="btn btn-xs btn-outline w-full" id="group-home-transfer-button" data-i18n="chat.group.homeTransfer"></button>
					</section>

					<!-- World -->
					<section id="world-info">
						<div class="flex items-center gap-2 mb-1">
							<img src="https://api.iconify.design/line-md/map-marker.svg" class="w-5 h-5 icon" />
							<span class="text-sm font-semibold" data-i18n="chat.sidebar.world.title"></span>
						</div>
						<select class="select select-sm border w-full" id="world-select"></select>
						<div id="world-details" class="sidebar-item-details mt-1"></div>
					</section>

					<!-- Persona -->
					<section id="persona-info">
						<div class="flex items-center gap-2 mb-1">
							<img src="https://api.iconify.design/line-md/emoji-grin.svg" class="w-5 h-5 icon" />
							<span class="text-sm font-semibold" data-i18n="chat.sidebar.persona.title"></span>
						</div>
						<select class="select select-sm border w-full" id="persona-select"></select>
						<div id="persona-details" class="sidebar-item-details mt-1"></div>
					</section>

					<!-- Chars -->
					<section id="char-list">
						<div class="flex items-center gap-2 mb-1">
							<img src="https://api.iconify.design/line-md/person.svg" class="w-5 h-5 icon" />
							<span class="text-sm font-semibold" data-i18n="chat.sidebar.charList.title"></span>
						</div>
						<div class="flex gap-1">
							<select class="select select-sm border flex-1" id="char-select"></select>
							<button id="add-char-button" class="btn btn-sm btn-primary" data-i18n="chat.sidebar.charList.buttons.addChar">
								<img src="https://api.iconify.design/line-md:account-add.svg" class="w-4 h-4" />
							</button>
						</div>
						<div id="char-details" class="flex flex-col gap-2 sidebar-item-details mt-1"></div>
					</section>

					<!-- Plugins -->
					<section id="plugin-list">
						<div class="flex items-center gap-2 mb-1">
							<img src="https://api.iconify.design/mdi/puzzle-outline.svg" class="w-5 h-5 icon" />
							<span class="text-sm font-semibold" data-i18n="chat.sidebar.pluginList.title"></span>
						</div>
						<div class="flex gap-1">
							<select class="select select-sm border flex-1" id="plugin-select"></select>
							<button id="add-plugin-button" class="btn btn-sm btn-primary" data-i18n="chat.sidebar.pluginList.buttons.addPlugin">
								<img src="https://api.iconify.design/line-md:plus-circle.svg" class="w-4 h-4" />
							</button>
						</div>
						<div id="plugin-details" class="flex flex-col gap-2 sidebar-item-details mt-1"></div>
					</section>

				</div>
			</div>
		</div>
	</div>

	<!-- Main Content -->
	<main class="flex-grow flex flex-col items-center justify-start h-full lg:pt-4">
		<div id="group-mode-panel" class="container mx-auto w-full lg:w-3/4 px-2 lg:px-4 mb-2 border border-base-300 rounded-lg bg-base-200/50 p-3 flex flex-col lg:flex-row gap-3">
			<div class="w-full lg:w-44 shrink-0">
				<div class="flex items-center justify-between mb-1">
					<div class="flex items-center gap-1.5">
						<div class="text-sm font-bold" data-i18n="chat.group.channelsTitle"></div>
						<span id="group-ws-status" title="WebSocket disconnected" class="inline-block w-2 h-2 rounded-full bg-error transition-colors duration-300"></span>
					</div>
					<label for="left-drawer" class="btn btn-ghost btn-xs p-0.5" title="群组设置">
						<img src="https://api.iconify.design/mdi/cog-outline.svg" class="w-4 h-4 icon" />
					</label>
				</div>
				<ul id="group-channel-tree" class="menu menu-xs bg-base-100 rounded-md p-1"></ul>
				<div class="text-xs font-semibold mt-2 mb-1" data-i18n="chat.group.bookmarksTitle"></div>
				<ul id="group-bookmarks-list" class="menu menu-xs bg-base-100 rounded-md p-1 max-h-36 overflow-y-auto mb-1"></ul>
				<button type="button" class="btn btn-xs btn-outline w-full mb-2" id="group-bookmark-add" data-i18n="chat.group.addBookmark"></button>
				<button type="button" class="btn btn-xs btn-primary w-full" id="group-create-button" data-i18n="chat.group.createGroup"></button>
				<button type="button" class="btn btn-xs btn-outline mt-1 w-full" id="group-new-channel-button" data-i18n="chat.group.newChannel"></button>
			</div>
			<div class="w-full lg:w-36 shrink-0 hidden lg:block">
				<div class="text-sm font-bold mb-1" data-i18n="chat.group.members"></div>
				<ul id="group-members-list" class="menu menu-xs"></ul>
			</div>
			<div class="flex-grow flex flex-col min-h-[12rem]">
				<div id="group-av-panel" class="hidden flex-col gap-2 mb-2">
					<div id="group-av-grid" class="grid gap-1 w-full min-h-[6rem] max-h-80 p-1 border border-base-300 rounded-lg bg-base-200" style="display: grid; grid-auto-rows: minmax(4rem, 1fr);">
						<div class="av-tile relative rounded-lg overflow-hidden bg-black cursor-pointer min-h-0" data-peer-id="local">
							<video id="group-av-local" class="w-full h-full object-cover" autoplay playsinline muted></video>
							<div class="absolute bottom-1 left-1 text-xs text-white bg-black/50 rounded px-1">你</div>
						</div>
					</div>
					<div class="flex flex-wrap gap-2">
						<button type="button" id="group-av-start" class="btn btn-sm btn-primary" data-i18n="chat.group.avStart"></button>
						<button type="button" id="group-av-mute" class="btn btn-sm" data-i18n="chat.group.avMute"></button>
						<button type="button" id="group-av-swap" class="btn btn-sm" data-i18n="chat.group.avSwap"></button>
						<button type="button" id="group-av-stop" class="btn btn-sm btn-outline" data-i18n="chat.group.avStop"></button>
					</div>
				</div>
				<div id="group-messages" class="flex-grow overflow-y-auto border border-base-300 rounded-md p-2 text-sm bg-base-100 min-h-[8rem]"></div>
				<div id="group-typing-indicator" class="text-xs text-base-content/70 hidden px-1 py-0.5 min-h-[1.25rem]" aria-live="polite"></div>
				<div class="flex flex-wrap gap-2 mt-2 items-end">
					<div id="group-pending-attachments" class="hidden flex flex-wrap gap-2 mb-1 p-1 border border-base-300 rounded-md bg-base-100 w-full"></div>
					<textarea id="group-message-input" class="textarea textarea-bordered flex-grow min-h-[3rem] text-sm" data-i18n="chat.group.inputPlaceholder"></textarea>
					<button type="button" class="btn btn-primary btn-sm" id="group-send-button" data-i18n="chat.group.send"></button>
					<button type="button" class="btn btn-outline btn-sm" id="group-file-button" data-i18n="chat.group.fileUpload"></button>
					<button type="button" class="btn btn-outline btn-sm gap-1" id="group-record-button"></button>
					<input type="file" id="group-file-input" class="hidden" multiple />
					<button type="button" class="btn btn-outline btn-sm" id="group-vote-button" data-i18n="chat.group.voteCreate"></button>
					<button type="button" class="btn btn-secondary btn-sm" id="group-streaming-button" data-i18n="chat.group.streamTest"></button>
				</div>
			</div>
		</div>
	</main>

	<!-- Right Sidebar (Description) -->
	<div class="fixed top-0 right-0 z-40 w-80 h-full sidebar-hidden" id="right-sidebar-container">
		<div class="bg-base-300 text-base-content border-l-2 border-base-content h-full" id="right-sidebar">
			<div class="p-4 h-full overflow-y-auto">
				<h2 class="text-xl mb-2" data-i18n="chat.rightSidebar.title"></h2>
				<article id="item-description" class="markdown-body"></article>
			</div>
		</div>
	</div>

	<script type="module" src="./index.mjs"></script>
</body>

</html>
