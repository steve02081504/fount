<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta property="og:title" content="The Stage of Whispers: Your fount Conversations" />
	<meta property="og:url" content="https://steve02081504.github.io/fount/protocol?url=fount://page/parts/shells:chat/" />
	<meta property="og:type" content="website" />
	<meta property="og:description" content="Where words take flight and stories unfold. Engage with your AI companions, shape the narrative, and lose yourself in the ebb and flow of digital dialogue. The heart of fount beats here." />
	<meta name="description" content="Where words take flight and stories unfold. Engage with your AI companions, shape the narrative, and lose yourself in the ebb and flow of digital dialogue. The heart of fount beats here." />
	<meta property="og:image" content="https://repository-images.githubusercontent.com/862251163/0ac90205-ae40-4fc6-af67-1e28d074c76b" />
	<title data-i18n="chat.title"></title>
	<link rel="icon" href="/favicon.ico" />
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<link rel="manifest" href="/manifest.json" />
	<script blocking="render" type="module" src="/preload.mjs"></script>
	<link href="https://cdn.jsdelivr.net/npm/daisyui/daisyui.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<link href="/base.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
	<script type="module" src="/base.mjs"></script>
	<link rel="stylesheet" href="./index.css" type="text/css" />
</head>

<body class="flex h-screen h-dvh m-0 relative w-full">
	<!-- Left Sidebar -->
	<div class="absolute top-0 left-0 z-40" id="left-drawer-container">
		<div class="drawer h-full">
			<input id="left-drawer" type="checkbox" class="drawer-toggle" aria-hidden="true" style="display: none;" />
			<div class="drawer-side z-40">
				<label for="left-drawer" class="drawer-overlay"></label>
				<div class="w-80 bg-base-200 text-base-content p-4 overflow-y-auto h-screen h-dvh shadow-lg">
					<ul class="menu w-full">
						<!-- Sidebar content here -->
						<li id="world-info">
							<div class="flex items-center justify-between mb-2">
								<div class="flex items-center">
									<img src="https://api.iconify.design/line-md/map-marker.svg" class="w-8 h-8 mr-2 icon" data-i18n="chat.sidebar.world.icon" />
									<h3 class="text-lg font-bold" data-i18n="chat.sidebar.world.title"></h3>
								</div>
							</div>
							<select class="select border w-full" id="world-select">
								<!-- 世界信息选项 -->
							</select>
							<div id="world-details" class="sidebar-item-details">
								<!-- 世界信息详情 -->
							</div>
						</li>
						<li id="persona-info">
							<div class="flex items-center justify-between mt-6 mb-2">
								<div class="flex items-center">
									<img src="https://api.iconify.design/line-md/emoji-grin.svg" class="w-8 h-8 mr-2 icon" data-i18n="chat.sidebar.persona.icon" />
									<h3 class="text-lg font-bold" data-i18n="chat.sidebar.persona.title"></h3>
								</div>
							</div>
							<select class="select border w-full" id="persona-select">
								<!-- 角色信息选项 -->
							</select>
							<div id="persona-details" class="sidebar-item-details">
								<!-- 角色信息详情 -->
							</div>
						</li>
						<li id="char-list">
							<div class="flex items-center justify-between mt-6 mb-2">
								<div class="flex items-center">
									<img src="https://api.iconify.design/line-md/person.svg" class="w-8 h-8 mr-2 icon" data-i18n="chat.sidebar.charList.icon" />
									<h3 class="text-lg font-bold" data-i18n="chat.sidebar.charList.title"></h3>
								</div>
							</div>
							<div class="flex justify-between">
								<select class="select border w-full" id="char-select">
									<!-- 角色信息选项 -->
								</select>
								<div class="join">
									<button id="add-char-button" class="btn btn-sm btn-primary join-item" data-i18n="chat.sidebar.charList.buttons.addChar">
										<img src="https://api.iconify.design/line-md:account-add.svg" data-i18n="chat.sidebar.charList.buttons.addCharIcon" />
									</button>
								</div>
							</div>
							<div id="char-details" class="flex flex-col gap-2 sidebar-item-details">
								<!-- 角色信息详情 -->
							</div>
						</li>
						<li id="plugin-list">
							<div class="flex items-center justify-between mt-6 mb-2">
								<div class="flex items-center">
									<img src="https://api.iconify.design/mdi/puzzle-outline.svg" class="w-8 h-8 mr-2 icon" data-i18n="chat.sidebar.pluginList.icon" />
									<h3 class="text-lg font-bold" data-i18n="chat.sidebar.pluginList.title"></h3>
								</div>
							</div>
							<div class="flex justify-between">
								<select class="select border w-full" id="plugin-select">
									<!-- 插件信息选项 -->
								</select>
								<div class="join">
									<button id="add-plugin-button" class="btn btn-sm btn-primary join-item" data-i18n="chat.sidebar.pluginList.buttons.addPlugin">
										<img src="https://api.iconify.design/line-md:plus-circle.svg" data-i18n="chat.sidebar.pluginList.buttons.addPluginIcon" />
									</button>
								</div>
							</div>
							<div id="plugin-details" class="flex flex-col gap-2 sidebar-item-details">
								<!-- 插件信息详情 -->
							</div>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>

	<!-- Main Content -->
	<main class="flex-grow flex flex-col items-center justify-start h-full lg:pt-4">
		<div id="group-mode-panel" class="hidden container mx-auto w-full lg:w-3/4 px-2 lg:px-4 mb-2 border border-base-300 rounded-lg bg-base-200/50 p-3 flex flex-col lg:flex-row gap-3">
			<div class="w-full lg:w-44 shrink-0">
				<div class="text-sm font-bold mb-1" data-i18n="chat.group.channelsTitle"></div>
				<ul id="group-channel-tree" class="menu menu-xs bg-base-100 rounded-md p-1"></ul>
				<div class="text-xs font-semibold mt-2 mb-1" data-i18n="chat.group.bookmarksTitle"></div>
				<ul id="group-bookmarks-list" class="menu menu-xs bg-base-100 rounded-md p-1 max-h-36 overflow-y-auto mb-1"></ul>
				<button type="button" class="btn btn-xs btn-outline w-full mb-2" id="group-bookmark-add" data-i18n="chat.group.addBookmark"></button>
				<button type="button" class="btn btn-xs btn-primary w-full" id="group-create-button" data-i18n="chat.group.createGroup"></button>
				<button type="button" class="btn btn-xs btn-outline mt-1 w-full" id="group-new-channel-button" data-i18n="chat.group.newChannel"></button>
			</div>
			<div class="w-full lg:w-36 shrink-0 hidden lg:block">
				<div class="text-sm font-bold mb-1" data-i18n="chat.group.members"></div>
				<ul id="group-members-list" class="menu menu-xs"></ul>
			</div>
			<div class="flex-grow flex flex-col min-h-[12rem]">
				<div id="group-av-panel" class="hidden flex-col gap-2 mb-2">
					<div class="grid grid-cols-2 gap-2">
						<video id="group-av-local" class="w-full rounded bg-base-300 max-h-40 aspect-video object-cover" playsinline muted></video>
						<video id="group-av-remote" class="w-full rounded bg-base-300 max-h-40 aspect-video object-cover" playsinline></video>
					</div>
					<div class="flex flex-wrap gap-2">
						<button type="button" id="group-av-start" class="btn btn-sm btn-primary" data-i18n="chat.group.avStart"></button>
						<button type="button" id="group-av-mute" class="btn btn-sm" data-i18n="chat.group.avMute"></button>
						<button type="button" id="group-av-swap" class="btn btn-sm" data-i18n="chat.group.avSwap"></button>
						<button type="button" id="group-av-stop" class="btn btn-sm btn-outline" data-i18n="chat.group.avStop"></button>
					</div>
				</div>
				<div id="group-messages" class="flex-grow overflow-y-auto border border-base-300 rounded-md p-2 text-sm bg-base-100 min-h-[8rem]"></div>
				<div id="group-typing-indicator" class="text-xs text-base-content/70 hidden px-1 py-0.5 min-h-[1.25rem]" aria-live="polite"></div>
				<div class="flex flex-wrap gap-2 mt-2 items-end">
					<textarea id="group-message-input" class="textarea textarea-bordered flex-grow min-h-[3rem] text-sm" data-i18n="chat.group.inputPlaceholder"></textarea>
					<button type="button" class="btn btn-primary btn-sm" id="group-send-button" data-i18n="chat.group.send"></button>
					<button type="button" class="btn btn-secondary btn-sm" id="group-streaming-button" data-i18n="chat.group.streamTest"></button>
				</div>
			</div>
		</div>
		<!-- Chat Area -->
		<div class="container mx-auto lg:p-4 w-full lg:w-3/4 flex flex-col h-full">
			<div class="chat-container card card-border bg-base-100/60 shadow-xl h-full flex flex-col overflow-hidden">
				<div class="chat-header card-title lg:flex justify-between items-center py-2 px-4 border-b bg-base-100">
					<h2 class="flex-grow text-lg font-bold" data-i18n="chat.chatArea.title"></h2>
					<div class="flex-none">
						<label for="left-drawer" class="btn btn-square btn-ghost" data-i18n="chat.chatArea.menuButton">
							<img src="https://api.iconify.design/line-md/list-3-solid.svg" class="text-icon" data-i18n="chat.chatArea.menuButtonIcon" />
						</label>
					</div>
				</div>
				<div class="chat-messages flex-grow overflow-y-auto flex flex-col px-[10px] py-2 lg:px-4 lg:py-3" id="chat-messages">
				</div>
				<div id="typing-indicator" class="items-center gap-2 p-4 py-2 text-sm text-base-content/70 hidden flex">
					<!-- Typing indicator content will go here -->
				</div>
				<div class="chat-input join p-4 py-0 max-lg:px-0">
					<button id="upload-button" class="join-item btn btn-secondary h-full" data-i18n="chat.chatArea.uploadButton"><img src="https://api.iconify.design/line-md/upload.svg" data-i18n="chat.chatArea.uploadButtonIcon" /></button>
					<div class="flex flex-col">
						<button id="voice-button" class="btn btn-accent" data-i18n="chat.chatArea.voiceButton"><img src="https://api.iconify.design/material-symbols/mic.svg" data-i18n="chat.chatArea.voiceButtonIcon" /></button>
						<button id="photo-button" class="btn btn-accent" data-i18n="chat.chatArea.photoButton"><img src="https://api.iconify.design/proicons/photo.svg" data-i18n="chat.chatArea.photoButtonIcon" /></button>
					</div>
					<textarea id="message-input" class="join-item textarea flex-grow" data-i18n="chat.chatArea.input"></textarea>
					<button id="send-button" class="join-item btn btn-primary h-full" data-i18n="chat.chatArea.sendButton"><img src="https://api.iconify.design/line-md/chat-round-twotone.svg" data-i18n="chat.chatArea.sendButtonIcon" /></button>
				</div>
				<input type="file" id="file-input" class="hidden" multiple />
				<div id="attachment-preview" class="p-4 flex gap-4 overflow-x-auto">
					<!-- 附件预览 -->
				</div>
			</div>
		</div>
	</main>

	<!-- Right Sidebar (Description) -->
	<div class="fixed top-0 right-0 z-40 w-80 h-full sidebar-hidden" id="right-sidebar-container">
		<div class="bg-base-300 text-base-content border-l-2 border-base-content h-full" id="right-sidebar">
			<div class="p-4 h-full overflow-y-auto">
				<h2 class="text-xl mb-2" data-i18n="chat.rightSidebar.title"></h2>
				<article id="item-description" class="markdown-body"></article>
			</div>
		</div>
	</div>

	<script type="module" src="./index.mjs"></script>
</body>

</html>
