<div class="space-y-4">
	<p class="text-sm opacity-70" data-i18n="profile.ownerDescription"></p>
	<div class="form-control">
		<label class="label py-1"><span class="label-text text-xs" data-i18n="profile.ownerEntityHashLabel"></span></label>
		<input id="profile-owner-entity-hash" type="text" class="input input-bordered input-sm w-full font-mono" maxlength="128" value="${ownerEntityHash}" data-i18n="profile.ownerEntityHash" />
	</div>
	<div id="profile-owner-agent-shortcuts" class="flex flex-wrap gap-2 ${agentShortcutsHidden}">
		${agentButtons}
	</div>
	<div class="flex flex-wrap gap-2 pt-1">
		<button type="button" id="profile-owner-save" class="btn btn-primary btn-sm" data-i18n="profile.ownerSave"></button>
		<button type="button" id="profile-owner-clear" class="btn btn-ghost btn-sm" data-i18n="profile.ownerClear"></button>
	</div>
</div>
