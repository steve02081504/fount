${members.length ? members.map(member => `
<div class="flex items-center justify-between p-3 bg-base-300 rounded-lg">
	<div class="flex items-center gap-3 min-w-0">
		<div class="avatar placeholder">
			<div class="bg-neutral text-neutral-content rounded-full w-10 h-10">
				<span class="text-sm">${member.initial}</span>
			</div>
		</div>
		<div class="min-w-0">
			<div class="font-medium truncate">${member.displayName}</div>
			<div class="text-xs opacity-60 truncate">
				<span data-i18n="chat.group.settingsPage.memberRoles"></span>
				${member.rolesLabel}
			</div>
		</div>
	</div>
	${showModerationActions ? `
	<div class="flex gap-2">
		<button class="btn btn-xs btn-warning" data-action="kick" data-username="${member.memberKey}" data-i18n="chat.group.settingsPage.kick" ${member.isAdmin && !member.isAgent ? 'disabled' : '' }></button>
		<button class="btn btn-xs btn-error" data-action="ban" data-username="${member.memberKey}" data-i18n="chat.group.settingsPage.ban" ${member.isAdmin && !member.isAgent ? 'disabled' : '' }></button>
	</div>
	` : ''}
</div>
`).join('') : '<p class="text-sm opacity-60" data-i18n="chat.group.settingsPage.noMembers"></p>'}
${bannedMembers?.length ? `
<h3 class="font-semibold text-sm mt-6 mb-2" data-i18n="chat.group.settingsPage.bannedTitle"></h3>
${bannedMembers.map(member => `
<div class="flex items-center justify-between p-3 bg-base-300 rounded-lg">
	<div class="font-medium truncate font-mono text-sm">${member.memberKey}</div>
	${showUnbanActions ? `<button class="btn btn-xs btn-outline" data-action="unban" data-username="${member.memberKey}" data-i18n="chat.group.settingsPage.unban"></button>` : ''}
</div>
`).join('')}
` : ''}
