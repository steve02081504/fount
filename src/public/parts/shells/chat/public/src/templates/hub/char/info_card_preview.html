<div class="hub-info-card" data-entity-hash="${entityHash}">
	<div class="hub-info-banner"></div>
	<div class="hub-info-body">
		<button type="button" class="hub-info-edit btn btn-ghost btn-xs" data-entity-profile-edit hidden data-i18n="profile.edit"></button>
		<div class="hub-info-avatar" data-entity-profile-avatar style="background:${avatarBg};color:${avatarTextColor};">${charAvatarHtml}<span data-entity-profile-letter hidden></span></div>
		<div class="hub-info-name" data-entity-profile-name>${charName}</div>
		<div class="hub-info-tags hub-profile-tags-row" data-entity-profile-tags hidden></div>
		<span class="hub-info-tag" data-i18n="chat.hub.charTag"></span>
		<div class="hub-info-description hub-char-description-md" data-entity-profile-bio style="margin-top:8px;">${descriptionPreview}</div>
		<button class="hub-info-cta btn btn-primary w-full mt-3" data-char="${charNameRaw}" data-i18n="chat.hub.startChatWith" data-name="${charName}"></button>
	</div>
</div>
</div>
