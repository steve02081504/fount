<div class="modal-box">
	<h3 class="font-bold text-lg mb-4" data-i18n="chat.group.createGroupTitle"></h3>
	<div class="form-control mb-3">
		<label class="label"><span class="label-text" data-i18n="chat.group.groupName"></span></label>
		<input type="text" id="new-group-name" class="input input-bordered" data-i18n-placeholder="chat.group.groupNamePlaceholder" />
	</div>
	<div class="form-control mb-4">
		<label class="label"><span class="label-text" data-i18n="chat.group.defaultChannelName"></span></label>
		<input type="text" id="new-group-channel" class="input input-bordered" data-i18n-placeholder="chat.group.defaultChannelNamePlaceholder" value="general" />
	</div>
	<div class="modal-action">
		<button id="create-group-cancel" class="btn btn-ghost" data-i18n="common.cancel"></button>
		<button id="create-group-confirm" class="btn btn-primary" data-i18n="common.create"></button>
	</div>
</div>
