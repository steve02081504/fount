<div class="friends-search-hit">
	<div class="char-list-avatar" style="background:${avatarBg};color:${avatarTextColor};">${avatarInner}</div>
	<div class="friends-search-hit-meta">
		<div class="friends-search-hit-label" data-label>${label}</div>
		<div class="friends-search-hit-sub">${handle}</div>
	</div>
	${showPin ? '<button type="button" class="btn btn-ghost btn-xs" data-pin data-i18n="chat.hub.friendsSearchPin"></button>' : ''}
	<button type="button" class="btn btn-primary btn-xs" data-dm data-i18n="${actionI18n}"></button>
</div>
