<div class="modal-box max-w-md">
	<p class="text-sm mb-3" data-i18n="chat.group.channelCryptoMigrateConfirm"></p>
	<label class="form-control w-full mb-3">
		<span class="label-text text-xs" data-i18n="chat.group.channelCryptoMigrateScheme"></span>
		<select class="select select-bordered select-sm w-full" data-crypto-scheme>
			<option value="aes-256-gcm">aes-256-gcm</option>
			<option value="none">none</option>
		</select>
	</label>
	<div class="modal-action">
		<button type="button" class="btn btn-ghost" data-crypto-cancel data-i18n="common.cancel"></button>
		<button type="button" class="btn btn-warning" data-crypto-confirm data-i18n="common.confirm"></button>
	</div>
</div>
