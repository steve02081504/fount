<div data-translation-part="body" class="hub-overlay-section space-y-3">
	<label class="hub-overlay-toggle-row">
		<span class="hub-setting-label">
			<span data-i18n="chat.hub.translationPrefs.autoTranslate"></span>
		</span>
		<input type="checkbox" class="toggle toggle-primary" id="hub-auto-translate" ${autoTranslateChecked} />
	</label>
	<p class="hub-overlay-toggle-description" data-i18n="chat.hub.translationPrefs.hint"></p>
</div>
<div data-translation-part="footer">
	<button type="button" class="hub-overlay-button hub-overlay-button-primary btn btn-primary" data-action="save" data-i18n="chat.hub.translationPrefs.save"></button>
	<button type="button" class="hub-overlay-button hub-overlay-button-cancel btn btn-ghost" data-action="close" data-i18n="chat.hub.modalClose"></button>
</div>
