<div class="modal-box max-w-md">
	<h3 class="font-bold text-lg" data-i18n="chat.hub.memberCtx.banTitle"></h3>
	<p class="text-sm opacity-80 py-2">${displayName}</p>
	<div class="flex flex-col gap-2 mt-2">
		<button type="button" class="btn btn-error btn-sm justify-start" data-dialog-resolve="entity" data-i18n="chat.hub.memberCtx.banEntity"></button>
		<button type="button" class="btn btn-error btn-sm justify-start" data-dialog-resolve="node" data-i18n="chat.hub.memberCtx.banNode"></button>
	</div>
	<div class="modal-action">
		<button type="button" class="btn btn-ghost" data-dialog-cancel data-i18n="common.cancel"></button>
	</div>
</div>
