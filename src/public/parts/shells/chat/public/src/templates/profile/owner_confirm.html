<div class="modal-box max-w-lg">
	<h3 class="font-bold text-lg text-error" data-i18n="profile.ownerConfirmTitle"></h3>
	<div class="alert alert-error shadow-sm mt-3">
		<div class="space-y-2 text-sm">
			<p class="font-semibold" data-i18n="profile.ownerConfirmWarningTitle"></p>
			<p data-i18n="profile.ownerConfirmEditBody"></p>
			<p data-i18n="profile.ownerConfirmRenderBody"></p>
		</div>
	</div>
	<p class="text-xs opacity-70 mt-3 font-mono break-all">${ownerLabel}</p>
	<div class="modal-action">
		<button type="button" class="btn btn-ghost" data-dialog-cancel data-i18n="profile.ownerConfirmCancel"></button>
		<button type="button" class="btn btn-error" id="profile-owner-confirm-button" disabled></button>
	</div>
</div>
