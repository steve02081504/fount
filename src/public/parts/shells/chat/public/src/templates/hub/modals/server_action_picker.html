<div class="modal-box server-action-picker-box max-w-xl p-0 overflow-hidden">
	<div class="server-action-picker-header p-6 text-center bg-gradient-to-br from-primary/90 to-primary text-primary-content">
		<h3 data-i18n="chat.hub.serverActionPickerTitle"></h3>
		<p data-i18n="chat.hub.serverActionPickerSubtitle"></p>
	</div>
	<div class="server-action-picker-body p-5 grid grid-cols-1 gap-3">
		<div class="server-action-picker-card card bg-base-200 border border-base-300 cursor-pointer hover:border-primary hover:-translate-y-0.5 transition-transform" data-action="create">
			<div class="card-body p-4">
				<div class="server-action-picker-card-icon">${createIconHtml}</div>
				<div class="server-action-picker-card-title font-semibold text-base" data-i18n="chat.hub.serverActionPickerCreate"></div>
				<div class="server-action-picker-card-description text-sm opacity-80" data-i18n="chat.hub.serverActionPickerCreateDescription"></div>
			</div>
		</div>
		<div class="server-action-picker-card card bg-base-200 border border-base-300 cursor-pointer hover:border-primary hover:-translate-y-0.5 transition-transform" data-action="join">
			<div class="card-body p-4">
				<div class="server-action-picker-card-icon">${joinIconHtml}</div>
				<div class="server-action-picker-card-title font-semibold text-base" data-i18n="chat.hub.serverActionPickerJoin"></div>
				<div class="server-action-picker-card-description text-sm opacity-80" data-i18n="chat.hub.serverActionPickerJoinDescription"></div>
			</div>
		</div>
	</div>
	<div class="server-action-picker-footer px-5 pb-4 flex justify-end">
		<button type="button" class="server-action-picker-cancel btn btn-ghost btn-sm" data-cancel data-i18n="chat.hub.cancel"></button>
	</div>
</div>
<form method="dialog" class="modal-backdrop"><button data-i18n="chat.hub.modalClose"></button></form>
