<div class="card bg-base-200 settings-card">
	<div class="card-body">
		<h2 class="card-title" data-i18n="chat.group.settingsPage.tabChannelPermissions"></h2>
		<p class="text-sm opacity-70" data-i18n="chat.group.settingsPage.channelPermsHint"></p>
		${channels.length ? `
		<div class="flex flex-col lg:flex-row gap-4">
			<div class="lg:w-52 shrink-0">
				<div class="text-xs font-semibold opacity-60 mb-2" data-i18n="chat.group.settingsPage.channelPermsSelectChannel"></div>
				<ul class="menu menu-sm bg-base-300 rounded-box p-1 max-h-64 overflow-y-auto">
					${channels.map(ch => `
					<li>
						<button type="button" class="${ch.id === selectedChannelId ? 'active' : ''}" data-action="select-channel" data-channel-id="${escapeHtml(ch.id)}">
							${escapeHtml(ch.name)}
						</button>
					</li>
					`).join('')}
				</ul>
			</div>
			<div class="flex-1 min-w-0">
				<div class="flex flex-wrap items-center gap-2 mb-4">
					<select id="channel-perms-add-role" class="select select-bordered select-sm">
						<option value="">—</option>
						${addableRoles.map(r => `
						<option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>
						`).join('')}
					</select>
					<button type="button" class="btn btn-sm btn-outline" data-action="add-role-override" data-i18n="chat.group.settingsPage.channelPermsAddRole"></button>
				</div>
				<div class="space-y-3">
					${rolePanels.length ? rolePanels.map(panel => `
					<details class="settings-role" data-role-panel="${escapeHtml(panel.roleId)}" open>
						<summary>
							<span class="settings-role-swatch" style="background-color: ${escapeHtml(panel.color)}" aria-hidden="true"></span>
							<span class="truncate">${escapeHtml(panel.name)}</span>
						</summary>
						<div class="settings-role-body">
							<div class="settings-role-perms">
								${panel.permRows.map(row => `
								<div class="flex items-center justify-between gap-2 py-1">
									<span class="text-sm" data-i18n="chat.group.settingsPage.perm${row.perm}"></span>
									<div class="join join-horizontal" role="group" data-role-id="${escapeHtml(panel.roleId)}" data-perm="${row.perm}">
										<button type="button" class="btn btn-xs join-item ${row.state === 'neutral' ? 'btn-active' : 'btn-ghost'}" data-action="channel-perm-state" data-state="neutral" data-i18n="chat.group.settingsPage.channelPermsStateNeutral"></button>
										<button type="button" class="btn btn-xs join-item ${row.state === 'allow' ? 'btn-success btn-active' : 'btn-ghost'}" data-action="channel-perm-state" data-state="allow" data-i18n="chat.group.settingsPage.channelPermsStateAllow"></button>
										<button type="button" class="btn btn-xs join-item ${row.state === 'deny' ? 'btn-error btn-active' : 'btn-ghost'}" data-action="channel-perm-state" data-state="deny" data-i18n="chat.group.settingsPage.channelPermsStateDeny"></button>
									</div>
								</div>
								`).join('')}
							</div>
							<button type="button" class="btn btn-ghost btn-xs text-error w-fit" data-action="remove-role-override" data-role-id="${escapeHtml(panel.roleId)}" data-i18n="chat.group.settingsPage.channelPermsRemoveRole"></button>
						</div>
					</details>
					`).join('') : '<p class="text-sm opacity-60 py-4">—</p>'}
				</div>
			</div>
		</div>
		` : `<p class="text-sm opacity-60" data-i18n="chat.group.settingsPage.channelPermsNoChannels"></p>`}
	</div>
</div>
