<div class="modal-box max-w-lg flex flex-col gap-3">
	<h3 class="font-bold text-base" data-i18n="chat.group.homeTransferTitle"></h3>
	<div data-ht-pane="1" class="flex flex-col gap-2">
		<p class="text-sm whitespace-pre-line" data-i18n="chat.group.homeTransferStep1"></p>
	</div>
	<div data-ht-pane="2" class="hidden flex flex-col gap-2">
		<p class="text-sm whitespace-pre-line" data-i18n="chat.group.homeTransferStep2"></p>
	</div>
	<div data-ht-pane="3" class="hidden flex flex-col gap-2">
		<label class="text-sm font-medium" data-i18n="chat.group.homeTransferInputLabel"></label>
		<input type="text" class="input input-bordered input-sm w-full font-mono" data-home-node-input autocomplete="off" />
		<label class="label cursor-pointer justify-start gap-2 py-1">
			<input type="checkbox" class="checkbox checkbox-sm" data-home-risk-ack />
			<span class="text-sm label-text" data-i18n="chat.group.homeTransferAck"></span>
		</label>
	</div>
	<div class="modal-action flex-wrap gap-2 mt-1">
		<button type="button" class="btn btn-ghost" data-ht-cancel data-i18n="common.cancel"></button>
		<button type="button" class="btn btn-ghost" data-ht-back data-i18n="chat.group.homeTransferBack"></button>
		<button type="button" class="btn btn-primary" data-ht-next data-i18n="chat.group.homeTransferNext"></button>
		<button type="button" class="btn btn-primary hidden" data-ht-submit data-i18n="chat.group.homeTransferSubmit"></button>
	</div>
</div>
