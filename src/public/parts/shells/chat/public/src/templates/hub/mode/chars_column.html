<div class="char-list-header" data-i18n="${countI18nKey || 'chat.hub.charCount'}" data-count="${count}"></div>
<div class="char-list">
	${items.map(item => `
	<button type="button" class="char-list-item list-item-char${item.activeClass}" data-friend-kind="${escapeHtml(item.kind || 'char')}" data-char="${escapeHtml(item.name)}" data-group-id="${escapeHtml(item.groupId || '')}" title="${escapeHtml(item.displayName)}">
		<div class="char-list-avatar" style="background:${item.avatarBg};color:${item.avatarTextColor || ''};">${item.avatarInner}</div>
		<div class="char-list-meta">
			<span class="char-list-name">${escapeHtml(item.displayName)}</span>
			${item.subtitle ? `<span class="char-list-subtitle">${escapeHtml(item.subtitle)}</span>` : ''}
		</div>
	</button>
	`).join('')}
</div>
