<div class="modal-box max-w-lg p-0 overflow-hidden">
	<div class="group-modal-hero p-6 bg-gradient-to-br from-primary to-primary/80 text-primary-content">
		<div class="group-modal-icon">
			<img src="https://api.iconify.design/line-md/account.svg" width="28" height="28" alt="" aria-hidden="true" />
		</div>
		<h3 class="font-bold text-xl" data-i18n="chat.hub.createModal.title"></h3>
		<p class="mt-1 text-sm opacity-90" data-i18n="chat.hub.createModal.subtitle"></p>
	</div>
	<form id="create-group-form" class="flex flex-col max-h-[70vh]">
		<div class="p-5 overflow-y-auto flex-1 space-y-4">
			<div>
				<div class="space-y-4">
					<h4 class="group-modal-section-title" data-i18n="chat.hub.createModal.basicSection"></h4>
					<label class="form-control w-full">
						<span class="label-text mb-1.5 font-medium"><span data-i18n="chat.hub.createModal.nameLabel"></span> <span class="text-error">*</span></span>
						<input type="text" name="name" class="input input-bordered w-full" required maxlength="50" data-i18n="chat.hub.createModal.name" />
					</label>
					<label class="form-control w-full">
						<span class="label-text mb-1.5 font-medium" data-i18n="chat.hub.createModal.descriptionLabel"></span>
						<textarea name="description" class="textarea textarea-bordered w-full" maxlength="200" data-i18n="chat.hub.createModal.description"></textarea>
					</label>
				</div>
			</div>
			<div>
				<h4 class="group-modal-section-title" data-i18n="chat.hub.createModal.joinSection"></h4>
				<div class="group-policy-grid">
					<label class="group-policy-card">
						<input type="radio" name="joinPolicy" value="invite-only" class="radio radio-primary radio-sm" checked />
						<span>
							<strong data-i18n="chat.hub.createModal.joinInviteOnly"></strong>
							<small data-i18n="chat.hub.createModal.joinInviteOnlyDescription"></small>
						</span>
					</label>
					<label class="group-policy-card">
						<input type="radio" name="joinPolicy" value="pow" class="radio radio-primary radio-sm" />
						<span>
							<strong data-i18n="chat.hub.createModal.joinPow"></strong>
							<small data-i18n="chat.hub.createModal.joinPowDescription"></small>
						</span>
					</label>
				</div>
			</div>
		</div>
		<div class="p-4 border-t border-base-300 flex justify-end gap-2">
			<button type="button" class="btn btn-ghost" data-dialog-back data-i18n="chat.hub.createModal.cancel"></button>
			<button type="submit" class="btn btn-primary" data-i18n="chat.hub.createModal.submit"></button>
		</div>
	</form>
</div>
<form method="dialog" class="modal-backdrop"><button data-i18n="chat.hub.modalClose"></button></form>
