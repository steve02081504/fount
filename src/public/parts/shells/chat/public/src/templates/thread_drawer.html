<div class="thread-drawer">
	<div class="flex items-center justify-between px-3 py-2 border-b border-base-300 shrink-0 bg-base-200/80">
		<div class="flex items-center gap-1.5 flex-1 truncate">
			<img src="https://api.iconify.design/mdi/forum-outline.svg" class="shrink-0 w-4 h-4" alt="">
			<span class="text-sm font-semibold truncate" data-thread-title></span>
		</div>
		<button type="button" class="btn btn-ghost btn-xs ml-2 shrink-0 inline-flex items-center justify-center" data-thread-close>
			<img src="https://api.iconify.design/line-md/close.svg" class="w-4 h-4" alt="">
		</button>
	</div>
	<nav class="flex items-center gap-1 px-3 py-1 text-xs bg-base-100/50 border-b border-base-300 min-h-0 min-w-0 max-w-full hidden overflow-x-auto overflow-y-visible flex-nowrap [scrollbar-width:thin]" aria-label="breadcrumb" data-thread-breadcrumb></nav>
	<div class="flex flex-col flex-1 min-h-0 overflow-hidden" data-thread-msgbox></div>
</div>
