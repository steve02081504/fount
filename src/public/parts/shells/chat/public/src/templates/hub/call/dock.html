<div class="call-dock-bar">
	<button type="button" class="call-dock-jump" data-call-role="jump" hidden>
		<span class="call-dock-title" data-i18n="chat.hub.callInProgress"></span>
		<span class="call-dock-channel" data-call-channel-name></span>
	</button>
	<span class="call-dock-title call-dock-title-static" data-i18n="chat.hub.callInProgress"></span>
	<span id="call-peer-label" class="call-peer-label" data-i18n="chat.hub.callParticipants" data-n="0">0</span>
	<div class="call-dock-actions">
		<button type="button" class="icon-button" data-call-role="mute" title="">
			${muteIconHtml}
		</button>
		<button type="button" class="icon-button" data-call-role="video" title="">
			${videoIconHtml}
		</button>
		<button type="button" class="icon-button" data-call-role="screen" title="">
			${screenIconHtml}
		</button>
		<button type="button" class="icon-button call-hangup" data-call-role="hangup" title="">
			${hangupIconHtml}
		</button>
	</div>
</div>
<div class="streaming-av-grid call-av-grid" id="call-av-grid">
	<div class="streaming-av-tile streaming-av-tile relative rounded-lg overflow-hidden bg-black min-h-0" data-peer-id="local">
		<video id="call-local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
		<div id="call-local-voice" class="streaming-av-voice-host" hidden></div>
		<div class="streaming-av-peer-label-inner" data-i18n="chat.hub.streamAvYou"></div>
	</div>
</div>
