<div class="space-y-4">
	<p class="text-sm opacity-70" data-i18n="profile.federationDescription"></p>
	<details class="collapse collapse-arrow bg-base-300/40 rounded-xl">
		<summary class="collapse-title text-sm font-medium min-h-0 py-3" data-i18n="profile.federationAdvanced"></summary>
		<div class="collapse-content space-y-3 pb-4">
			<div class="form-control">
				<label class="label py-1"><span class="label-text text-xs" data-i18n="profile.federationRelayUrlsLabel"></span></label>
				<textarea id="profile-federation-relay-urls" class="textarea textarea-bordered textarea-sm w-full" rows="3" placeholder="wss://broker.emqx.io:8084/mqtt">${relayText}</textarea>
			</div>
			<label class="flex items-center justify-between gap-3 rounded-lg bg-base-300/50 px-3 py-2 cursor-pointer">
				<span class="text-sm" data-i18n="profile.federationBatterySaverLabel"></span>
				<input type="checkbox" id="profile-federation-battery-saver" class="toggle toggle-sm" ${batteryChecked} />
			</label>
		</div>
	</details>
	<div class="flex flex-wrap gap-2 pt-1">
		<button type="button" id="profile-federation-save" class="btn btn-primary btn-sm" data-i18n="profile.federationSave"></button>
		<button type="button" id="profile-federation-reset" class="btn btn-ghost btn-sm" data-i18n="profile.federationResetDefault"></button>
	</div>
</div>
