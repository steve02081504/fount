<div class="info-card" data-entity-hash="${entityHash}">
	<div class="info-banner"></div>
	<div class="info-body">
		<button type="button" class="info-edit btn btn-ghost btn-xs" data-entity-profile-edit hidden data-i18n="profile.edit"></button>
		<div class="info-avatar" data-entity-profile-avatar style="background:${avatarBg};color:${avatarTextColor};">${charAvatarHtml}<span data-entity-profile-letter hidden></span></div>
		<div class="info-name" data-entity-profile-name>${charName}</div>
		<div class="info-tags profile-tags-row" data-entity-profile-tags hidden></div>
		<span class="info-tag badge badge-sm border-0 mt-1.5" data-i18n="chat.hub.charTagSolo"></span>
		<div class="info-description char-description-md markdown-body" data-entity-profile-bio style="margin-top:8px;"></div>
	</div>
</div>
