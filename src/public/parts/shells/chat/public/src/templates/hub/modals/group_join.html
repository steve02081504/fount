<div class="modal-box group-join-modal-box">
	<div class="group-join-header">
		<h3 data-i18n="chat.hub.joinModal.title"></h3>
		<p data-i18n="chat.hub.joinModal.subtitle"></p>
	</div>
	<form id="join-group-form">
		<div class="group-join-body">
			<label class="group-join-label" for="group-join-id-input" data-i18n="chat.hub.joinModal.groupIdLabel"></label>
			<input id="group-join-id-input" name="groupId" class="group-join-input" required autofocus data-i18n="chat.hub.joinModal.groupId" autocomplete="off" />
			<label class="group-join-label" for="group-join-invite-input" data-i18n="chat.hub.joinModal.inviteLabel"></label>
			<input id="group-join-invite-input" name="inviteCode" class="group-join-input" data-i18n="chat.hub.joinModal.invite" autocomplete="off" />
			<div class="group-join-hint" data-i18n="chat.hub.joinModal.hint"></div>
		</div>
		<div class="group-join-footer">
			<button type="button" class="group-join-button group-join-button-cancel" data-action="cancel" data-i18n="chat.hub.joinModal.cancel"></button>
			<button type="submit" class="group-join-button group-join-button-primary" data-i18n="chat.hub.joinModal.submit"></button>
		</div>
	</form>
</div>
<form method="dialog" class="modal-backdrop"><button data-i18n="chat.hub.modalClose"></button></form>
