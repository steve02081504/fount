<div class="modal-box group-join-modal-box max-w-lg p-0 overflow-hidden">
	<div class="group-modal-hero p-6 bg-gradient-to-br from-primary/90 to-primary text-primary-content">
		<div class="group-modal-icon">
			<img src="https://api.iconify.design/mdi/link-variant.svg" width="28" height="28" alt="" aria-hidden="true" />
		</div>
		<h3 class="text-xl font-bold" data-i18n="chat.hub.joinModal.title"></h3>
		<p class="mt-1 text-sm opacity-85" data-i18n="chat.hub.joinModal.subtitle"></p>
	</div>
	<form id="join-group-form">
		<div class="p-6 space-y-4">
			<label class="form-control w-full">
				<span class="label-text mb-1.5 font-medium" data-i18n="chat.hub.joinModal.groupIdLabel"></span>
				<input id="group-join-id-input" name="groupId" class="input input-bordered w-full" required autofocus data-i18n="chat.hub.joinModal.groupId" autocomplete="off" />
			</label>
			<label class="form-control w-full">
				<span class="label-text mb-1.5 font-medium" data-i18n="chat.hub.joinModal.inviteLabel"></span>
				<input id="group-join-invite-input" name="inviteCode" class="input input-bordered w-full" data-i18n="chat.hub.joinModal.invite" autocomplete="off" />
			</label>
			<div class="group-modal-hint">
				<img src="https://api.iconify.design/mdi/information-outline.svg" width="18" height="18" alt="" aria-hidden="true" />
				<span data-i18n="chat.hub.joinModal.hint"></span>
			</div>
		</div>
		<div class="px-6 py-4 border-t border-base-300 flex justify-end gap-2">
			<button type="button" class="btn btn-ghost" data-action="cancel" data-i18n="chat.hub.joinModal.cancel"></button>
			<button type="submit" class="btn btn-primary min-w-28" data-i18n="chat.hub.joinModal.submit"></button>
		</div>
	</form>
</div>
<form method="dialog" class="modal-backdrop"><button data-i18n="chat.hub.modalClose"></button></form>
