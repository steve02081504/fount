<div class="profile-popup" data-profile-popup>
	<button type="button" class="profile-popup-close btn btn-ghost btn-xs btn-circle" data-profile-popup-close data-i18n="chat.hub.profilePopup.close">×</button>
	<div class="profile-popup-banner" aria-hidden="true">
		<span class="entity-profile-card-orb entity-profile-card-orb-a"></span>
		<span class="entity-profile-card-orb entity-profile-card-orb-b"></span>
	</div>
	<div class="profile-popup-body">
		<div class="profile-popup-avatar-wrap">
			<div class="profile-popup-avatar" data-profile-popup-avatar data-entity-profile-avatar>
				<span data-profile-popup-avatar-letter data-entity-profile-letter></span>
			</div>
			<span class="status-dot profile-popup-status-dot" data-profile-popup-status-dot data-entity-profile-status-dot data-status="offline"></span>
		</div>
		<div class="profile-popup-identity">
			<h2 class="profile-popup-name" data-profile-popup-name data-entity-profile-name></h2>
			<div class="entity-profile-card-handle" data-entity-profile-handle></div>
			<div class="profile-popup-status-text" data-profile-popup-status-text data-entity-profile-status-text></div>
		</div>
		<div class="profile-popup-actions">
			<button type="button" class="profile-popup-dm-button btn btn-primary btn-sm" data-profile-popup-dm hidden data-i18n="chat.hub.profilePopup.dmUser"></button>
			<button type="button" class="profile-popup-social-button btn btn-ghost btn-sm" data-profile-popup-social hidden data-i18n="social.profile.viewPosts"></button>
			<button type="button" class="profile-popup-edit-button btn btn-ghost btn-sm" data-profile-popup-edit data-entity-profile-edit hidden data-i18n="profile.edit"></button>
			<button type="button" class="profile-popup-care-button btn btn-ghost btn-sm" data-profile-popup-care hidden data-i18n="chat.hub.profilePopup.care"></button>
			<button type="button" class="profile-popup-alias-button btn btn-ghost btn-sm" data-profile-popup-alias hidden data-i18n="chat.hub.profilePopup.setAlias"></button>
		</div>
		<div class="entity-profile-card-meta">
			<div class="entity-attribution-warning-host" data-entity-attribution-warning-host hidden></div>
			<div class="entity-owned-by-host" data-entity-owned-by-host hidden></div>
			<div class="profile-tags-row" data-entity-profile-tags hidden></div>
		</div>
		<div class="profile-popup-divider"></div>
		<div class="profile-popup-section-title" data-i18n="chat.hub.aboutSection"></div>
		<div class="profile-popup-bio" data-profile-popup-bio data-entity-profile-bio data-i18n="chat.hub.bioEmpty"></div>
		<div class="entity-profile-card-links" data-entity-profile-links hidden></div>
	</div>
</div>
