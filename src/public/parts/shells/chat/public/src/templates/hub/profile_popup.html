<div class="hub-profile-popup" data-profile-popup>
	<button type="button" class="hub-profile-popup-close btn btn-ghost btn-xs btn-circle" data-profile-popup-close data-i18n="chat.hub.profilePopup.close">×</button>
	<div class="hub-profile-popup-banner"></div>
	<div class="hub-profile-popup-body">
		<button type="button" class="hub-profile-popup-edit-button btn btn-ghost btn-sm" data-profile-popup-edit data-entity-profile-edit hidden data-i18n="profile.edit"></button>
		<button type="button" class="hub-profile-popup-care-button btn btn-ghost btn-sm" data-profile-popup-care hidden data-i18n="chat.hub.profilePopup.care"></button>
		<button type="button" class="hub-profile-popup-alias-button btn btn-ghost btn-sm" data-profile-popup-alias hidden data-i18n="chat.hub.profilePopup.setAlias"></button>
		<button type="button" class="hub-profile-popup-dm-button btn btn-primary btn-sm" data-profile-popup-dm hidden data-i18n="chat.hub.profilePopup.dmUser"></button>
		<button type="button" class="hub-profile-popup-social-button btn btn-ghost btn-sm" data-profile-popup-social hidden data-i18n="social.profile.viewPosts"></button>
		<div class="hub-profile-popup-avatar-wrap">
			<div class="hub-profile-popup-avatar" data-profile-popup-avatar data-entity-profile-avatar>
				<span data-profile-popup-avatar-letter data-entity-profile-letter></span>
			</div>
			<span class="hub-status-dot hub-profile-popup-status-dot" data-profile-popup-status-dot data-entity-profile-status-dot data-status="offline"></span>
		</div>
		<div class="hub-profile-popup-name-row">
			<div class="hub-profile-popup-name" data-profile-popup-name data-entity-profile-name></div>
		</div>
		<div class="entity-attribution-warning-host" data-entity-attribution-warning-host hidden></div>
		<div class="entity-owned-by-host" data-entity-owned-by-host hidden></div>
		<div class="hub-profile-popup-status-text" data-profile-popup-status-text data-entity-profile-status-text></div>
		<span class="hub-profile-popup-tag badge badge-ghost badge-sm" data-profile-popup-entity-tag></span>
		<div class="hub-profile-tags-row" data-entity-profile-tags hidden></div>
		<div class="hub-profile-popup-divider"></div>
		<div class="hub-profile-popup-section-title" data-i18n="chat.hub.aboutSection"></div>
		<div class="hub-profile-popup-bio" data-profile-popup-bio data-entity-profile-bio data-i18n="chat.hub.bioEmpty"></div>
	</div>
</div>
