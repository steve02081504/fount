<div class="saved-line">
	<button type="button" class="saved-row pinned-message-row" data-pinned-message-channel="${channelId}" data-pinned-message-event="${eventId}" title="${eventId}">
		<img src="https://api.iconify.design/mdi/pin.svg" class="saved-icon" alt="" aria-hidden="true" />
		<span class="saved-text">
			<span class="saved-title"${previewI18nAttr}>${previewText}</span>
			<span class="saved-meta saved-meta-channel">${channelName}</span>
		</span>
	</button>
	<button type="button" class="saved-remove pinned-message-unpin-button" data-pinned-message-channel="${channelId}" data-pinned-message-event="${eventId}" data-i18n="chat.hub.pinUnpinSidebar">×</button>
</div>
