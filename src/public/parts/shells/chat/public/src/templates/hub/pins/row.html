<div class="hub-saved-line">
	<button type="button" class="hub-saved-row hub-pinned-message-row" data-pinned-message-channel="${channelId}" data-pinned-message-event="${eventId}" title="${eventId}">
		<img src="https://api.iconify.design/mdi/pin.svg" class="hub-saved-icon" alt="" aria-hidden="true" />
		<span class="hub-saved-text">
			<span class="hub-saved-title"${previewI18nAttr}>${previewText}</span>
			<span class="hub-saved-meta hub-saved-meta-channel">${channelName}</span>
		</span>
	</button>
	<button type="button" class="hub-saved-remove hub-pinned-message-unpin-button" data-pinned-message-channel="${channelId}" data-pinned-message-event="${eventId}" data-i18n="chat.hub.pinUnpinSidebar">×</button>
</div>
