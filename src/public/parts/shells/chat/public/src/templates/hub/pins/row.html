<div class="hub-pinned-message-row-line">
	<button type="button" class="hub-side-link hub-pinned-message-row inline-flex items-center gap-1" data-pinned-message-channel="${channelId}" data-pinned-message-event="${eventId}" title="${eventId}"><img src="https://api.iconify.design/mdi/pin.svg" class="w-4 h-4 shrink-0" alt="" aria-hidden="true" /> ${channelName} · <span${previewI18nAttr}>${previewText}</span></button>
	<button type="button" class="hub-pinned-message-unpin-button" data-pinned-message-channel="${channelId}" data-pinned-message-event="${eventId}" data-i18n="chat.hub.pinUnpinSidebar">×</button>
</div>
