<div class="hub-member-item${adminClass}${charClass}" title="${username}" data-member-key="${memberKey}" data-entity-hash="${entityHash}"${memberKindAttr}>
	<div class="hub-member-avatar-wrap">
		<div class="hub-member-avatar" data-avatar-for="${avatarFor}" style="background: ${avatarColor};">${avatarInitial}</div>
		<span class="hub-status-dot hub-member-status-dot" data-status="offline"></span>
	</div>
	<div class="hub-member-name">${username}</div>
</div>
