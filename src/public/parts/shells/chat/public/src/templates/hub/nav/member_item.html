<div class="member-item${adminClass}${charClass}" title="${username}" data-member-key="${memberKey}" data-entity-hash="${entityHash}"${memberKindAttr}>
	<div class="member-avatar-wrap">
		<div class="member-avatar" data-avatar-for="${avatarFor}" style="background: ${avatarColor}; color: ${avatarTextColor};">${avatarInitial}</div>
		<span class="status-dot member-status-dot" data-status="offline"></span>
	</div>
	<div class="member-name">${username}</div>
</div>
