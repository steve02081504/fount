<div class="chat ${align} hub-message-row ${rowClass} relative group" ${rowAttrs}>
	${avatarBlock}
	<div class="chat-header text-sm">${headerHtml}</div>
	<div class="chat-bubble ${bubbleClass} hub-message-content"${bubbleAttrs}>${contentHtml}</div>
	${footerHtml ? `<div class="chat-footer">${footerHtml}</div>` : ''}
	${hoverBarHtml ? `<div class="hub-msg-hover-bar">${hoverBarHtml}</div>` : ''}
</div>
