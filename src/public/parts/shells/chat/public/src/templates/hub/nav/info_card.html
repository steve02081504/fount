<div class="hub-info-card">
	<div class="hub-info-banner"></div>
	<div class="hub-info-body">

		<div class="hub-info-name" ${nameI18nAttr}>${groupName}</div>
		<span class="hub-info-tag" data-i18n="chat.hub.groupTag"></span>

	</div>
