<div class="info-card">
	<div class="info-banner"></div>
	<div class="info-body">
		<div class="info-avatar" style="background:${avatarColor};color:${avatarTextColor};">${avatarInitial}</div>
		<div class="info-name" ${nameI18nAttr}>${groupName}</div>
		<span class="info-tag badge badge-sm border-0 mt-1.5" data-i18n="chat.hub.groupTag"></span>
		<div class="info-description" style="margin-top:8px;" ${descriptionI18nAttr}>${description}</div>
	</div>
</div>
