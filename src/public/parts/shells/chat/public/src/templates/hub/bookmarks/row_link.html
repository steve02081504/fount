<div class="saved-line">
	<a class="saved-row bookmark-row" href="${escapeHtml(href)}">
		<img src="https://api.iconify.design/mdi/bookmark.svg" class="saved-icon" alt="" aria-hidden="true" />
		<span class="saved-text">
			<span class="saved-title"${titleI18nAttr}>${title}</span>
			<span class="saved-meta">${meta}</span>
		</span>
	</a>
	<button type="button" class="saved-remove bookmark-remove" data-bookmark-href="${escapeHtml(href)}" data-i18n="chat.hub.bookmarkRemove">×</button>
</div>
