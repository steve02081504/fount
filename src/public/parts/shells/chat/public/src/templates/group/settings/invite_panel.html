<div class="card bg-base-200 shadow-xl mb-6">
	<div class="card-body">
		<h2 class="card-title" data-i18n="chat.group.settingsPage.inviteTitle"></h2>
		<p class="text-sm opacity-70" data-i18n="chat.group.settingsPage.inviteHint"></p>
		<button type="button" id="group-settings-mint-invite-button" class="btn btn-primary btn-sm mt-2" data-i18n="chat.group.settingsPage.inviteMint"></button>
		<div id="invite-result" class="hidden mt-3 text-sm space-y-2">
			<div><span class="opacity-60" data-i18n="chat.group.settingsPage.inviteGroupId"></span><br><code id="group-settings-invite-group-id" class="break-all"></code></div>
			<div><span class="opacity-60" data-i18n="chat.group.settingsPage.inviteCode"></span><br><code id="invite-code" class="break-all"></code></div>
			<div id="invite-exp" class="opacity-60"></div>
			<button type="button" id="group-settings-copy-invite-button" class="btn btn-outline btn-sm" data-i18n="chat.group.settingsPage.inviteCopy"></button>
		</div>
	</div>
</div>
