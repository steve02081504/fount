<div class="flex flex-col gap-1 w-full border-l-2 border-primary/40 pl-2" data-edit-panel>
	<div class="text-xs opacity-60 mb-1" data-i18n="chat.group.editingMessage"></div>
	<textarea class="textarea textarea-bordered w-full text-sm resize-none overflow-hidden min-h-[2.5rem]" rows="1" data-edit-textarea></textarea>
	<div class="flex gap-2 mt-1">
		<button type="button" class="btn btn-xs btn-primary" data-edit-confirm data-i18n="chat.group.editConfirm"></button>
		<button type="button" class="btn btn-xs btn-ghost" data-edit-cancel data-i18n="chat.group.editCancel"></button>
	</div>
	<div class="text-[10px] opacity-50 mt-0.5" data-i18n="chat.group.editHint"></div>
</div>
