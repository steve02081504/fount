<div class="card bg-base-200 settings-card">
	<div class="card-body">
		<h2 class="card-title" data-i18n="chat.group.settingsPage.overviewTitle"></h2>
		<p class="text-sm opacity-70" data-i18n="chat.group.settingsPage.overviewHint"></p>
		<div class="settings-fields mt-1">
			<div class="form-control">
				<label class="label" for="group-overview-name"><span class="label-text" data-i18n="chat.group.settingsPage.nameLabel"></span></label>
				<input type="text" id="group-overview-name" class="input input-bordered" readonly value="${escapeHtml(currentState.groupMeta?.name ?? '')}">
			</div>
			<div class="form-control">
				<label class="label" for="group-overview-description"><span class="label-text" data-i18n="chat.group.settingsPage.descriptionLabel"></span></label>
				<textarea id="group-overview-description" class="textarea textarea-bordered" rows="3" readonly>${escapeHtml(currentState.groupMeta?.description ?? '')}</textarea>
			</div>
		</div>
	</div>
</div>
