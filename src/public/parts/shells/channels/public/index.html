<!DOCTYPE html>
<html data-theme="dark">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title data-i18n="channels.title">频道</title>
	<link rel="icon" href="/favicon.ico" />
	<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
	<script blocking="render" type="module" src="/preload.mjs"></script>
	<link href="https://cdn.jsdelivr.net/npm/daisyui/daisyui.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<link href="/base.css" rel="stylesheet" type="text/css" crossorigin="anonymous" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" crossorigin="anonymous"></script>
	<script type="module" src="/base.mjs"></script>
	<link rel="stylesheet" href="./index.css" type="text/css" />
	<style>
		:root {
			--dc-bg-server: #1e1f22;
			--dc-bg-channel: #2b2d31;
			--dc-bg-main: #313338;
			--dc-bg-input: #383a40;
			--dc-text-muted: #949ba4;
			--dc-text-normal: #dbdee1;
			--dc-text-bright: #f2f3f5;
			--dc-accent: #5865f2;
			--dc-hover: rgba(255, 255, 255, 0.04);
			--dc-active: rgba(255, 255, 255, 0.08);
			--dc-border: #1f2023;
			--dc-success: #23a559;
			--dc-danger: #f23f43;
		}

		html, body {
			margin: 0;
			padding: 0;
			height: 100vh;
			overflow: hidden;
			background: var(--dc-bg-main);
			color: var(--dc-text-normal);
			font-family: 'gg sans', 'Noto Sans', system-ui, -apple-system, sans-serif;
		}

		.dc-app { display: flex; height: 100vh; width: 100vw; }
		.dc-app::-webkit-scrollbar { width: 8px; }

		/* === 服务器栏（Home 返回按钮） === */
		.dc-server-bar {
			width: 72px;
			background: var(--dc-bg-server);
			padding: 12px 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 8px;
			flex-shrink: 0;
		}
		.dc-server-item {
			width: 48px;
			height: 48px;
			border-radius: 24px;
			background: var(--dc-bg-channel);
			color: var(--dc-text-normal);
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			transition: border-radius 0.15s ease, background 0.15s ease;
			text-decoration: none;
			position: relative;
		}
		.dc-server-item:hover { border-radius: 16px; background: var(--dc-accent); color: white; }
		.dc-server-item.active { border-radius: 16px; background: var(--dc-accent); color: white; }
		.dc-server-tooltip {
			position: absolute; left: 60px; top: 50%; transform: translateY(-50%);
			background: black; color: white; padding: 6px 10px; border-radius: 4px;
			font-size: 14px; font-weight: 600; white-space: nowrap;
			pointer-events: none; opacity: 0; transition: opacity 0.15s ease; z-index: 100;
		}
		.dc-server-item:hover .dc-server-tooltip { opacity: 1; }

		/* === 频道列表栏 === */
		.dc-channel-bar {
			width: 240px;
			background: var(--dc-bg-channel);
			display: flex;
			flex-direction: column;
			flex-shrink: 0;
		}
		.dc-channel-header {
			padding: 0 16px;
			height: 48px;
			min-height: 48px;
			border-bottom: 1px solid var(--dc-border);
			box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
			font-weight: 700;
			font-size: 16px;
			color: var(--dc-text-bright);
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
		}
		.dc-channel-search {
			padding: 8px;
		}
		.dc-channel-search input {
			width: 100%;
			background: var(--dc-bg-server);
			color: var(--dc-text-normal);
			border: none;
			padding: 6px 10px;
			border-radius: 4px;
			font-size: 14px;
			outline: none;
		}
		.dc-channel-search input::placeholder { color: var(--dc-text-muted); }
		.dc-quick-actions {
			padding: 0 8px 8px;
			display: flex;
			gap: 4px;
		}
		.dc-quick-action-btn {
			flex: 1;
			background: transparent;
			color: var(--dc-text-muted);
			border: 1px solid var(--dc-border);
			padding: 6px 8px;
			border-radius: 4px;
			font-size: 12px;
			cursor: pointer;
			transition: all 0.1s ease;
		}
		.dc-quick-action-btn:hover { background: var(--dc-hover); color: var(--dc-text-bright); }

		.dc-channel-list-wrap {
			flex: 1;
			overflow-y: auto;
			padding: 0 0 8px;
		}
		.dc-channel-list-wrap::-webkit-scrollbar { width: 8px; }
		.dc-channel-list-wrap::-webkit-scrollbar-track { background: transparent; }
		.dc-channel-list-wrap::-webkit-scrollbar-thumb { background: var(--dc-bg-server); border-radius: 4px; }

		.dc-category-title {
			padding: 16px 8px 4px 16px;
			font-size: 12px;
			font-weight: 600;
			text-transform: uppercase;
			color: var(--dc-text-muted);
		}

		/* === 频道项 === */
		#channel-list {
			padding: 0 8px;
		}
		#channel-list .channel-item {
			margin: 1px 0;
			padding: 6px 8px;
			border-radius: 4px;
			font-size: 14px;
			color: var(--dc-text-muted);
			cursor: pointer;
			display: flex;
			align-items: center;
			gap: 8px;
			transition: background 0.1s ease, color 0.1s ease;
			user-select: none;
		}
		#channel-list .channel-item:hover {
			background: var(--dc-hover);
			color: var(--dc-text-normal);
			transform: none;
		}
		#channel-list .channel-item.active {
			background: var(--dc-active);
			color: var(--dc-text-bright);
			border-left: none;
		}
		#channel-list .channel-item .channel-prefix {
			color: var(--dc-text-muted);
			font-size: 18px;
			font-weight: 400;
			flex-shrink: 0;
			width: 16px;
		}
		#channel-list .channel-item .channel-name {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			flex: 1;
		}
		#channel-list .channel-item .channel-meta {
			display: none;
		}

		.dc-user-bar {
			height: 52px;
			min-height: 52px;
			background: rgba(0, 0, 0, 0.2);
			display: flex;
			align-items: center;
			padding: 0 8px;
			gap: 8px;
		}
		.dc-user-avatar {
			width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
			display: flex; align-items: center; justify-content: center;
			color: white; font-weight: 600; font-size: 13px; overflow: hidden;
		}
		.dc-user-avatar img { width: 100%; height: 100%; object-fit: cover; }

		/* === 主聊天区 === */
		.dc-main {
			flex: 1;
			display: flex;
			flex-direction: column;
			background: var(--dc-bg-main);
			min-width: 0;
		}

		/* 频道头部覆盖 */
		#channel-header {
			background: var(--dc-bg-main) !important;
			border-bottom: 1px solid var(--dc-border) !important;
			box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
			height: 48px;
			min-height: 48px;
			padding: 0 16px !important;
		}
		#channel-header > div { width: 100%; }
		#channel-name { color: var(--dc-text-bright); font-size: 16px; font-weight: 700; }
		#channel-description { color: var(--dc-text-muted); font-size: 12px; }

		/* 消息容器 */
		#messages-container {
			background: var(--dc-bg-main);
		}
		#messages-container::-webkit-scrollbar { width: 8px; }
		#messages-container::-webkit-scrollbar-track { background: transparent; }
		#messages-container::-webkit-scrollbar-thumb { background: var(--dc-bg-server); border-radius: 4px; }

		#empty-state { color: var(--dc-text-muted); }

		/* 消息样式 */
		.dc-message {
			padding: 2px 16px;
			display: flex;
			gap: 16px;
			position: relative;
		}
		.dc-message:hover { background: rgba(4, 4, 5, 0.07); }
		.dc-message.first-in-group { margin-top: 16px; padding-top: 4px; }

		.dc-avatar {
			width: 40px; height: 40px; border-radius: 50%;
			flex-shrink: 0; display: flex; align-items: center; justify-content: center;
			color: white; font-weight: 600; font-size: 16px;
			cursor: pointer; user-select: none; overflow: hidden;
		}
		.dc-avatar img { width: 100%; height: 100%; object-fit: cover; }
		.dc-message:not(.first-in-group) .dc-avatar { visibility: hidden; height: 0; }

		.dc-message-body { flex: 1; min-width: 0; }
		.dc-message-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
		.dc-message:not(.first-in-group) .dc-message-header { display: none; }
		.dc-message-author { color: var(--dc-text-bright); font-weight: 500; font-size: 16px; }
		.dc-message-time { color: var(--dc-text-muted); font-size: 12px; }
		.dc-message-content {
			color: var(--dc-text-normal); font-size: 16px; line-height: 1.375;
			word-wrap: break-word; white-space: pre-wrap;
		}
		.dc-message-content img { max-width: 400px; max-height: 300px; border-radius: 6px; display: block; margin-top: 4px; }

		/* 输入区覆盖 */
		#message-input-container {
			background: var(--dc-bg-main) !important;
			border-top: none !important;
			padding: 0 16px 24px !important;
		}
		#message-input-container > .flex {
			background: var(--dc-bg-input);
			border-radius: 8px;
			padding: 0 8px !important;
			align-items: center !important;
			gap: 4px !important;
		}
		#message-input {
			background: transparent !important;
			border: none !important;
			outline: none !important;
			color: var(--dc-text-normal);
			font-size: 16px;
			padding: 11px 8px !important;
			min-height: 22px;
			height: 44px !important;
			resize: none;
		}
		#message-input::placeholder { color: var(--dc-text-muted); }
		#message-input-container .btn { color: var(--dc-text-muted); }
		#message-input-container .btn:hover { color: var(--dc-text-bright); background: transparent; }
		#send-message-btn {
			background: var(--dc-accent) !important;
			color: white !important;
			border: none !important;
		}
		#send-message-btn:hover { background: #4752c4 !important; }

		/* === 成员栏 === */
		#member-sidebar {
			width: 240px !important;
			background: var(--dc-bg-channel) !important;
			border-left: none !important;
		}
		#member-sidebar > div { padding: 16px 0 !important; }
		#member-sidebar h3 {
			padding: 8px 16px 4px;
			font-size: 12px;
			font-weight: 600;
			text-transform: uppercase;
			color: var(--dc-text-muted);
			margin: 0;
		}
		#channel-member-list { padding: 0 8px; }
		#channel-member-list > div {
			padding: 6px 8px !important;
			border-radius: 4px;
			margin: 0;
		}
		#channel-member-list > div:hover { background: var(--dc-hover) !important; }

		/* === 选择器（emoji/sticker） === */
		#channel-emoji-picker, #channel-sticker-picker {
			background: var(--dc-bg-channel) !important;
			border: 1px solid var(--dc-border) !important;
			color: var(--dc-text-normal);
			box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
		}
		#channel-emoji-picker .tab-active { background: var(--dc-active); color: var(--dc-text-bright); }

		/* === 模态框 === */
		.modal-box {
			background: var(--dc-bg-channel) !important;
			color: var(--dc-text-normal) !important;
		}
		.modal-box h3 { color: var(--dc-text-bright); }
		.modal-box .input, .modal-box .textarea, .modal-box .select {
			background: var(--dc-bg-input);
			color: var(--dc-text-normal);
			border-color: var(--dc-border);
		}

		/* === 顶部导航条隐藏（用 Discord 头部代替） === */
		body > div > .navbar { display: none !important; }
		body > div > div.flex.flex-1 { height: 100vh; }

		/* 响应式 */
		@media (max-width: 1024px) {
			#member-sidebar { display: none !important; }
		}
		@media (max-width: 768px) {
			.dc-channel-bar { display: none; }
			.dc-server-bar { width: 60px; }
		}

		.dc-empty-page {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			color: var(--dc-text-muted);
			padding: 40px;
		}
	</style>
</head>

<body class="m-0 relative w-full">
	<!-- Discord 风格 4 栏布局 -->
	<div class="dc-app">
		<!-- 服务器栏（仅返回主页 + 创建频道） -->
		<aside class="dc-server-bar">
			<a href="/parts/shells:home" class="dc-server-item" title="返回主页">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
					<polyline points="9 22 9 12 15 12 15 22"/>
				</svg>
				<span class="dc-server-tooltip">返回主页</span>
			</a>
			<div style="width: 32px; height: 2px; background: var(--dc-bg-channel); border-radius: 1px; margin: 4px 0;"></div>
			<a href="/parts/shells:chat/discord.html" class="dc-server-item" title="切换到群组">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M17 20h5v-2a3 3 0 00-5.356-1.857"/><path d="M9 20H4v-2a3 3 0 015.356-1.857"/>
					<path d="M9 20h6v-2a3 3 0 00-3-3 3 3 0 00-3 3v2z"/>
					<circle cx="12" cy="7" r="4"/>
				</svg>
				<span class="dc-server-tooltip">群组</span>
			</a>
			<button id="create-channel-btn" class="dc-server-item" style="background: var(--dc-bg-channel); color: var(--dc-success); border: none;" title="创建频道">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
				</svg>
				<span class="dc-server-tooltip">创建频道</span>
			</button>
		</aside>

		<!-- 频道栏 -->
		<aside class="dc-channel-bar">
			<header class="dc-channel-header">
				<span data-i18n="channels.title">频道</span>
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
			</header>

			<div class="dc-channel-search">
				<input type="text" id="search-input" placeholder="搜索频道..." />
			</div>
			<div class="dc-quick-actions">
				<button id="join-channel-btn" class="dc-quick-action-btn">+ 通过 ID 加入</button>
			</div>

			<div class="dc-channel-list-wrap">
				<div class="dc-category-title">订阅频道</div>
				<div id="channel-list" class="space-y-1">
					<!-- 频道列表将在这里动态生成 -->
				</div>
			</div>

			<!-- 用户卡 -->
			<div class="dc-user-bar">
				<div class="dc-user-avatar" id="my-avatar-mini" style="background: #5865f2;">?</div>
				<div style="flex: 1; min-width: 0;">
					<div id="my-name-mini" style="color: var(--dc-text-bright); font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">加载中...</div>
					<div style="color: var(--dc-text-muted); font-size: 12px;">在线</div>
				</div>
			</div>
		</aside>

		<!-- 主聊天区 -->
		<main class="dc-main">
			<!-- 频道头部 -->
			<div id="channel-header" class="hidden">
				<div class="flex items-center justify-between" style="width:100%">
					<div class="flex items-center gap-3">
						<div class="avatar hidden">
							<div class="w-8 h-8 rounded-full">
								<img id="channel-avatar" src="" alt="Channel Avatar" />
							</div>
						</div>
						<span class="dc-main-header-icon" style="color: var(--dc-text-muted); font-size: 20px;">#</span>
						<div>
							<h2 id="channel-name" class="text-lg font-bold"></h2>
							<p id="channel-description" class="text-sm opacity-70"></p>
						</div>
					</div>
					<div class="flex gap-2">
						<button id="subscribe-btn" class="btn btn-sm hidden" style="background: var(--dc-accent); color: white; border: none;">
							<span data-i18n="channels.subscribe">订阅</span>
						</button>
						<button id="unsubscribe-btn" class="btn btn-sm btn-ghost hidden" style="color: var(--dc-text-muted);">
							<span data-i18n="channels.unsubscribe">取消订阅</span>
						</button>
						<button id="channel-settings-btn" class="btn btn-sm btn-ghost hidden" style="color: var(--dc-text-muted);">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
							</svg>
						</button>
						<button id="toggle-members-btn" class="btn btn-sm btn-ghost" title="成员列表" style="color: var(--dc-text-muted);">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
							</svg>
						</button>
					</div>
				</div>
			</div>

			<!-- 消息列表 -->
			<div id="messages-container" class="flex-1 overflow-y-auto p-0">
				<div id="messages-list" class="flex flex-col">
				</div>
				<div id="empty-state" class="dc-empty-page">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mx-auto opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
					</svg>
					<p style="color: var(--dc-text-bright); font-size: 18px; font-weight: 600; margin: 16px 0 8px;">欢迎来到频道广场</p>
					<p>从左侧选择一个频道开始浏览消息</p>
				</div>
			</div>

			<!-- 消息输入框 -->
			<div id="message-input-container" class="hidden relative">
				<!-- 表情选择器 -->
				<div id="channel-emoji-picker" class="hidden absolute mb-2 rounded-xl shadow-xl p-3 w-80 z-50" style="bottom: 60px; left: 16px;">
					<div class="flex justify-between items-center mb-2">
						<span class="font-bold text-sm">表情</span>
						<button id="close-channel-emoji" class="btn btn-ghost btn-xs btn-circle">✕</button>
					</div>
					<div class="tabs tabs-boxed mb-2" id="ch-emoji-tabs" style="background: var(--dc-bg-input);">
						<a class="tab tab-sm tab-active" data-tab="face">😀</a>
						<a class="tab tab-sm" data-tab="gesture">👋</a>
						<a class="tab tab-sm" data-tab="heart">❤️</a>
						<a class="tab tab-sm" data-tab="animal">🐱</a>
						<a class="tab tab-sm" data-tab="food">🍔</a>
						<a class="tab tab-sm" data-tab="object">⚽</a>
					</div>

				<div id="channel-sticker-picker" class="hidden absolute mb-2 rounded-xl shadow-xl p-3 w-80 z-50" style="bottom: 60px; right: 16px;">

					<div id="ch-sticker-grid" class="grid grid-cols-4 gap-2 max-h-56 overflow-y-auto">

				<div class="flex items-end">

							<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>

						<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
						</svg>
					</button>
					<button type="button" id="ch-sticker-btn" class="btn btn-ghost btn-circle btn-sm" title="贴纸">
						<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">

		<!-- 成员栏 -->
		<aside id="member-sidebar" class="hidden">

			</div>

	</div>

	<!-- 创建频道模态框 -->
	<dialog id="create-channel-modal" class="modal">
		<div class="modal-box">
			<h3 class="font-bold text-lg" data-i18n="channels.create">创建频道</h3>
			<div class="py-4 space-y-4">
				<div class="form-control">
					<label class="label">
						<span class="label-text">频道名称</span>
					</label>
					<input type="text" id="new-channel-name" class="input input-bordered" placeholder="输入频道名称" />
				</div>
				<div class="form-control">
					<label class="label">
						<span class="label-text">频道描述</span>
					</label>
					<textarea id="new-channel-description" class="textarea textarea-bordered" placeholder="输入频道描述"></textarea>
				</div>
				<div class="form-control">
					<label class="label">
						<span class="label-text">频道类型</span>
					</label>
					<select id="new-channel-type" class="select select-bordered">
						<option value="announcement">公告</option>
						<option value="news">新闻</option>
						<option value="updates">更新</option>
					</select>
				</div>
				<div class="form-control">

	<!-- 频道设置模态框 -->
	<dialog id="channel-settings-modal" class="modal">
		<div class="modal-box max-w-lg">
			<h3 class="font-bold text-lg mb-4">频道设置</h3>
			<div class="space-y-4">
				<div class="form-control">
					<label class="label"><span class="label-text">频道名称</span></label>
					<input type="text" id="settings-channel-name" class="input input-bordered" />
				</div>
				<div class="form-control">
					<label class="label"><span class="label-text">频道描述</span></label>
					<textarea id="settings-channel-desc" class="textarea textarea-bordered" rows="3"></textarea>
				</div>
				<div class="form-control">
					<label class="label"><span class="label-text">频道类型</span></label>
					<select id="settings-channel-type" class="select select-bordered">
						<option value="announcement">公告</option>
						<option value="news">新闻</option>
						<option value="updates">更新</option>
					</select>
				</div>
				<div class="form-control">
					<label class="label cursor-pointer">
						<span class="label-text">公开频道</span>
						<input type="checkbox" id="settings-channel-public" class="checkbox" />

				</div>
				<div class="divider">频道ID</div>
				<div class="text-sm opacity-70 select-all break-all" id="settings-channel-id"></div>

			<div class="modal-action">
				<button id="delete-channel-btn" class="btn btn-error">删除频道</button>
				<button id="save-channel-settings-btn" class="btn btn-primary">保存</button>
				<button class="btn" onclick="document.getElementById('channel-settings-modal').close()">取消</button>
			</div>
		</div>
		<form method="dialog" class="modal-backdrop"><button>close</button></form>
	</dialog>

	<!-- 加入频道模态框 -->
	<dialog id="join-channel-modal" class="modal">
		<div class="modal-box">
			<h3 class="font-bold text-lg mb-4">加入频道</h3>
			<div class="form-control">
				<label class="label"><span class="label-text">输入频道ID</span></label>
				<input type="text" id="join-channel-id-input" class="input input-bordered" placeholder="例如: channel_xxxxx" />
			</div>
			<div class="modal-action">
				<button id="join-channel-confirm" class="btn btn-primary">加入</button>
				<button class="btn" onclick="document.getElementById('join-channel-modal').close()">取消</button>
			</div>
		</div>
		<form method="dialog" class="modal-backdrop"><button>close</button></form>
	</dialog>

	<script type="module" src="./index.mjs"></script>
	<script type="module">
		// 加载用户头像 + 用户名
		(async () => {
			try {
				const meResp = await fetch('/api/user/me', { credentials: 'include' })
				if (!meResp.ok) return
				const me = await meResp.json()
				const username = me.username || me.data?.username
				if (!username) return
				document.getElementById('my-name-mini').textContent = username

				const profResp = await fetch(`/api/parts/shells:profile/${encodeURIComponent(username)}`, { credentials: 'include' })
				if (!profResp.ok) return
				const profData = await profResp.json()
				const avatar = profData?.profile?.avatar || profData?.data?.avatar || profData?.avatar
				const av = document.getElementById('my-avatar-mini')
				if (avatar) {
					av.innerHTML = `<img src="${avatar}" alt="${username}" />`
				} else {
					av.textContent = (username.charAt(0) || '?').toUpperCase()
				}
			} catch { }
		})()
	</script>
</body>
