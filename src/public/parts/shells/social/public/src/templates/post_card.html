<article class="post-card card" data-post-id="${postId}" data-post-text="${postTextEncoded}" data-visibility="${visibilityCode}">
	${repostBanner}
	${repostCommentHtml}
	${embeddedWrapStart}
	<header class="post-header">
		<div class="post-header-row">
			${headerAvatarHtml}
			<div class="post-author">
				<a href="${headerLink}" class="link-btn author-name">${headerAuthor}</a>
				<span class="post-meta">${postMeta}</span>
			</div>
		</div>
	</header>
	${quoteHtml}
	${groupRefHtml}
	${mediaHtml}
	<div class="body markdown-body">${bodyHtml}</div>
	${embeddedWrapEnd}
	<div class="post-actions">
		<button type="button" class="action-btn like-btn${likedClass}" data-like="${actionKey}" data-liked="${likedFlag}">${likeLabel} (${likeCount})</button>
		<button type="button" class="action-btn repost-btn" data-repost="${actionKey}"><span data-i18n="social.actions.repost"></span> (${repostCount})</button>
		<button type="button" class="action-btn quote-btn" data-quote="${actionKey}"><span data-i18n="social.actions.quote"></span></button>
		<button type="button" class="action-btn replies-btn" data-replies="${actionKey}"><span data-i18n="social.actions.replies"></span> (${replyCount})</button>
		<button type="button" class="action-btn" data-save="${actionKey}"><span data-i18n="social.actions.save"></span></button>
		<button type="button" class="action-btn" data-copy-link="${actionKey}"><span data-i18n="social.actions.copyLink"></span></button>
		<button type="button" class="action-btn" data-translate="${actionKey}"><span data-i18n="social.actions.translate"></span></button>
		<button type="button" class="action-btn dm-btn" data-dm="${entityHash}"><span data-i18n="social.actions.dm"></span></button>
		${blockBtn}
		${deleteBtn}
	</div>
	<div class="repost-panel hidden" data-repost-for="${actionKey}">
		<textarea rows="2" data-i18n="social.repost"></textarea>
		<button type="button" data-submit-repost="${actionKey}"><span data-i18n="social.repost.submit"></span></button>
	</div>
	<div class="replies hidden" data-replies-for="${actionKey}"></div>
</article>
